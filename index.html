<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Luna Trade — Manual Forex Backtester (OANDA)</title>
<link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/assets/favicon-16x16.png">
<link rel="icon" href="/assets/favicon.ico" sizes="any">
<link rel="apple-touch-icon" sizes="180x180" href="/assets/apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/klinecharts@9.8.10/dist/umd/klinecharts.min.js"></script>
<style>
  :root{
    --bg:#101013; --panel:#1b1b1f; --panel-2:#000; --border:#434346; --txt:#fff; --muted:#89898b;
    --green:#54c88c; --red:#ff6f6f; --accent:#4a71ff;
    --buy:#54c88c; --sell:#ff6f6f; --tint-buy:#1b2f2a; --tint-sell:#3d1a1e;
    --inset:#0e0e11; --btn:#1b1b1f; --btn-hover:#26262b; --btn-border-hover:#3a3a40; --line:#26262b;
  }
  body.light{
    --bg:#f4f6f9; --panel:#ffffff; --panel-2:#fff; --border:#d6dbe2; --txt:#1e242e; --muted:#697280;
    --green:#1a9d6e; --red:#d8504e; --accent:#3a5fe0;
    --buy:#54c88c; --sell:#ff6f6f; --tint-buy:#e3f3ec; --tint-sell:#fbe9e9;
    --inset:#eef1f5; --btn:#eef1f5; --btn-hover:#e1e6ed; --btn-border-hover:#c2cad4; --line:#e7eaef;
  }
  *{box-sizing:border-box}
  body{margin:0;font:12px/1.45 'Inter',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
       background:var(--bg);color:var(--txt);height:100vh;display:flex;flex-direction:column;overflow:hidden}
  .toolbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;padding:8px 12px;
           background:var(--panel);border-bottom:1px solid var(--border)}
  input,select{background:var(--inset);border:1px solid var(--border);color:var(--txt);border-radius:6px;padding:5px 8px;font-size:13px}
  button{background:var(--btn);border:1px solid var(--border);color:var(--txt);border-radius:6px;
         padding:6px 11px;cursor:pointer;font-size:13px}
  button:hover{border-color:var(--btn-border-hover);background:var(--btn-hover)}
  button:disabled{opacity:.4;cursor:not-allowed}
  button.primary{background:var(--accent);border-color:var(--accent);color:#fff}
  /* BUY/SELL pastel ala TradeLocker (mint / salmon, teks gelap) */
  button.buy{background:var(--buy);border-color:var(--buy);color:#06291b;font-weight:700}
  button.sell{background:var(--sell);border-color:var(--sell);color:#3d0c0c;font-weight:700}
  button.buy:hover,button.sell:hover{filter:brightness(1.07)}
  button.tf{padding:5px 10px;font-weight:600}
  button.tf.on,button.on{background:var(--accent);border-color:var(--accent);color:#fff}
  button.tool.armed{background:rgba(74,113,255,.16);border-color:transparent;color:var(--accent)}
  .grow{flex:1}
  .status{font-size:12px;color:var(--muted)}
  /* --- auth (Fase 2a): avatar akun di pojok kanan + dropdown + overlay login/register --- */
  .user-menu{position:relative;display:inline-flex;align-items:center;margin-left:2px}
  .user-avatar{width:30px;height:30px;border-radius:50%;border:1px solid var(--border);background:var(--accent);
               color:#fff;font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;
               text-transform:uppercase;padding:0}
  .user-avatar:hover{filter:brightness(1.1)}
  .user-avatar img,.user-av-lg img{width:100%;height:100%;border-radius:50%;object-fit:cover;display:block}
  .user-pop{position:absolute;top:38px;right:0;width:236px;background:var(--panel);border:1px solid var(--border);
            border-radius:11px;box-shadow:var(--shadow);padding:12px;display:none;flex-direction:column;gap:10px;z-index:1000}
  .user-pop.open{display:flex}
  .user-pop-head{display:flex;align-items:center;gap:10px}
  .user-av-lg{width:38px;height:38px;border-radius:50%;background:var(--accent);color:#fff;font-weight:600;font-size:15px;
              display:flex;align-items:center;justify-content:center;text-transform:uppercase;flex:0 0 auto}
  .user-pop-id{min-width:0}
  .user-pop-name{font-size:13px;font-weight:600;color:var(--txt);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .user-pop-email{font-size:11px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .user-pop-row{display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--muted);
                padding-top:9px;border-top:1px solid var(--line)}
  .user-pop-row b{color:var(--txt);font-weight:600}
  .user-pop-logout{height:34px;border:1px solid var(--border);border-radius:8px;background:var(--btn);color:var(--txt);
                   cursor:pointer;font-size:13px;font-weight:500;margin-top:2px}
  .user-pop-logout:hover{background:var(--btn-hover)}
  .auth-overlay{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;
                background:rgba(8,8,11,.72);backdrop-filter:blur(6px)}
  .auth-card{width:340px;max-width:calc(100vw - 32px);background:var(--panel);border:1px solid var(--border);
             border-radius:14px;box-shadow:var(--shadow);padding:24px 22px;display:flex;flex-direction:column;gap:14px}
  .auth-brand{display:flex;align-items:center;gap:10px;font-size:17px;font-weight:600;color:var(--txt)}
  .auth-tabs{display:flex;gap:4px;background:var(--inset);border-radius:9px;padding:3px}
  .auth-tab{flex:1;height:32px;border:0;border-radius:7px;background:transparent;color:var(--muted);
            cursor:pointer;font-size:13px;font-weight:500}
  .auth-tab.active{background:var(--panel);color:var(--txt);box-shadow:0 1px 2px rgba(0,0,0,.25)}
  .auth-field{display:flex;flex-direction:column;gap:5px;font-size:11px;color:var(--muted);letter-spacing:.02em}
  .auth-field input{height:38px;padding:0 11px;border-radius:8px;background:var(--inset);
                    border:1px solid var(--border);color:var(--txt);font-size:14px;outline:none}
  .auth-field input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--ring)}
  .auth-err{min-height:16px;font-size:12px;color:var(--red)}
  .auth-submit{height:40px;border:0;border-radius:9px;background:var(--accent);color:#fff;
               font-size:14px;font-weight:600;cursor:pointer}
  .auth-submit:disabled{opacity:.6;cursor:default}
  .auth-or{display:flex;align-items:center;gap:10px;color:var(--muted);font-size:11px;margin:2px 0}
  .auth-or::before,.auth-or::after{content:"";flex:1;height:1px;background:var(--border)}
  .auth-google{display:flex;align-items:center;justify-content:center;gap:9px;height:40px;border-radius:9px;
               background:#fff;color:#1f1f1f;border:1px solid var(--border);font-size:14px;font-weight:500;cursor:pointer}
  .auth-google:hover{background:#f2f2f2}
  .main{flex:1;display:flex;min-height:0}
  .chartwrap{flex:1;display:flex;flex-direction:column;min-width:0;background:var(--bg)}
  .tfbar{display:flex;gap:5px;align-items:center;padding:6px 10px;border-bottom:1px solid var(--border);background:var(--panel)}
  .tfbar .sep{width:1px;height:20px;background:var(--border);margin:0 4px}
  .zoomhint{font-size:11px;color:var(--muted);margin-left:auto}
  #chart{flex:1;min-height:0;position:relative}
  /* countdown candle berikutnya — pill di sumbu kanan, sejajar garis harga terakhir */
  .price-timer{ position:absolute; right:1px; z-index:5; pointer-events:none; display:none;
    background:var(--accent); color:#fff; font:600 10px/1 var(--mono); white-space:nowrap;
    padding:3px 6px; border-radius:0 0 4px 4px; letter-spacing:.02em; }
  /* label waktu di sumbu-X saat hover area future (candle belum terbentuk) */
  .axis-time{ position:absolute; z-index:6; pointer-events:none; display:none;
    transform:translateX(-50%); background:var(--accent); color:#fff; font:600 10px/1 var(--mono);
    white-space:nowrap; padding:3px 6px; border-radius:4px; }
  .sidebar{width:300px;background:var(--panel);border-left:1px solid var(--border);
           display:flex;flex-direction:column;overflow-y:auto}
  .panel{padding:12px;border-bottom:1px solid var(--border)}
  .panel h3{margin:0 0 9px;font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted)}
  .row{display:flex;gap:6px;align-items:center;margin-bottom:7px}
  .row label{width:74px;color:var(--muted);font-size:12px}
  .row input,.row select{flex:1;width:100%}
  .btns{display:flex;gap:5px}
  .btns button{flex:1;padding:8px 0}
  .clock{font-variant-numeric:tabular-nums;color:var(--accent);font-weight:600}
  .price{font-variant-numeric:tabular-nums}
  .stats{display:grid;grid-template-columns:1fr 1fr;gap:7px}
  .stat{background:var(--inset);border:1px solid var(--border);border-radius:6px;padding:7px 9px}
  .stat .k{font-size:10px;color:var(--muted);text-transform:uppercase}
  .stat .v{font-size:16px;font-weight:600;font-variant-numeric:tabular-nums;margin-top:2px}
  .pos{color:var(--green)} .neg{color:var(--red)}
  table{width:100%;border-collapse:collapse;font-size:11.5px}
  th,td{text-align:right;padding:4px 5px;border-bottom:1px solid var(--line);font-variant-numeric:tabular-nums}
  th{color:var(--muted);font-weight:500;position:sticky;top:0;background:var(--panel)}
  td:first-child,th:first-child{text-align:left}
  .journal-wrap{max-height:200px;overflow-y:auto}
  .kbd{display:inline-block;background:var(--inset);border:1px solid var(--border);border-radius:4px;padding:1px 5px;font-size:11px;color:var(--muted)}
  .open-trade{background:var(--inset);border:1px solid var(--border);border-radius:6px;padding:8px;margin-bottom:8px;font-size:12px}
  .hint{font-size:11px;color:var(--muted);margin-top:4px}
  .chartrow{flex:1;display:flex;min-height:0}
  .drawtools{width:42px;background:var(--panel);border-right:1px solid var(--border);
             display:flex;flex-direction:column;align-items:center;gap:4px;padding:6px 0}
  .drawtools .spacer{flex:1}
  .dtool{width:32px;height:32px;display:flex;align-items:center;justify-content:center;padding:0;color:var(--muted)}
  .dtool:hover{color:var(--txt)}
  .dtool.armed{background:rgba(74,113,255,.16);border-color:transparent;color:var(--accent);border-radius:9px}
  .dtool svg{width:18px;height:18px}
  a{color:var(--accent)}
  .speed{display:flex;gap:6px;align-items:center;margin-top:7px}
  .speed input{flex:1}
  .replaybar{display:flex;align-items:center;gap:10px;padding:6px 12px;background:var(--panel);border-top:1px solid var(--border)}
  .replaybar.collapsed{padding:3px 12px}
  .replaybar.collapsed .rcontent{display:none}
  .rcontent{display:flex;align-items:center;gap:10px;flex:1;flex-wrap:nowrap;overflow-x:auto}
  .replaybar select{height:28px;padding:2px 6px;border-radius:6px;background:var(--btn);border:1px solid var(--border);color:var(--txt);font-size:12px;cursor:pointer}
  .rsep{width:1px;height:18px;background:var(--border)}
  .rlabel{color:var(--muted);font-size:11px}
  .datefield{position:relative;display:inline-flex}
  .datedisplay{padding:5px 12px;font-variant-numeric:tabular-nums;white-space:nowrap}
  .datefield input[type=date]{position:absolute;inset:0;width:100%;height:100%;opacity:0;pointer-events:none}
  .replaybar .clock{color:var(--accent);font-weight:600;font-variant-numeric:tabular-nums}
  .replaybar .price{font-variant-numeric:tabular-nums}
  .replaybar button{padding:5px 12px}
  /* panel bawah: Trade Manual & Statistik (collapsible) */
  .bottompanel{background:var(--panel);border-top:1px solid var(--border);max-height:38vh;overflow-y:auto}
  .bottompanel.collapsed .bottomcontent{display:none}
  .bottomhead{display:flex;align-items:center;gap:8px;padding:5px 12px;border-bottom:1px solid var(--border)}
  .bottomhead .rlabel{font-size:11px;color:var(--muted)}
  .bottomcontent{display:block;padding:0}
  /* tabs Positions/Pending/Closed/Statistik (ala TradeLocker) */
  .tp-tabs{display:flex;gap:2px}
  .tp-tabs button{background:transparent;border:0;border-radius:0;color:var(--muted);font-size:12px;
    padding:6px 12px;border-bottom:2px solid transparent;display:inline-flex;align-items:center;gap:6px}
  .tp-tabs button:hover{color:var(--txt)}
  .tp-tabs button.on{color:var(--txt);border-bottom-color:var(--accent)}
  .tp-tabs button b{font-size:10px;color:var(--muted);background:var(--inset);border-radius:9px;padding:0 6px;font-weight:600}
  .tp-tabs button.on b{color:var(--accent)}
  .tp-pane{display:block}
  .tp-pane[hidden]{display:none}
  #paneStats{padding:11px 12px}
  .tp-tablewrap{overflow:auto;max-height:100%}
  .tp-table{width:100%;border-collapse:collapse;font-size:12px}
  .tp-table thead th{position:sticky;top:0;background:var(--panel);z-index:1;
    font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.44px;text-transform:capitalize;
    text-align:left;padding:9px 10px;white-space:nowrap}
  .tp-table tbody td{padding:9px 10px;color:var(--txt);white-space:nowrap;font-variant-numeric:tabular-nums}
  .tp-table tbody tr:hover{background:var(--btn-hover)}
  .tp-table .t-side-buy{color:var(--green);font-weight:600}
  .tp-table .t-side-sell{color:var(--red);font-weight:600}
  .tp-table .t-pos{color:var(--green)} .tp-table .t-neg{color:var(--red)}
  .tp-table .t-act button{font-size:11px;padding:3px 9px;margin-right:5px}
  .tp-empty{padding:22px 12px;color:var(--muted);font-size:12px;text-align:center}
  .bp-section{display:flex;flex-direction:column;gap:8px;min-width:0;padding:11px 12px}
  .bp-title{margin:0;font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted)}
  .bp-trade{display:flex;align-items:flex-end;gap:10px;flex-wrap:wrap}
  .fld{display:flex;flex-direction:column;gap:3px}
  .fld label{font-size:10px;color:var(--muted)}
  .fld input{width:92px}
  .bp-trade button.buy,.bp-trade button.sell{padding:7px 14px}
  .bp-trade #openTradeBox{flex-basis:100%}
  .bp-stats .stats{display:grid;grid-template-columns:repeat(4,minmax(82px,1fr));gap:7px}
  .bp-journal{flex:1;min-width:300px}
  .bp-journal .journal-wrap{max-height:26vh}
  /* context menu klik-kanan di chart */
  .ctxmenu{position:fixed;z-index:1000;background:var(--panel);border:1px solid var(--border);
           border-radius:7px;padding:4px;box-shadow:0 8px 24px rgba(0,0,0,.45);min-width:160px}
  .ctxitem{padding:7px 12px;border-radius:5px;cursor:pointer;font-size:13px;color:var(--txt);
           display:flex;align-items:center;gap:8px}
  .ctxitem:hover{background:var(--btn-hover)}
  /* editor teks inline di chart */
  .text-editor,.text-editor:focus,.text-editor:focus-visible{position:fixed;z-index:1100;background:transparent;color:var(--txt);
    border:none;caret-color:var(--accent);box-shadow:none;outline:none;
    border-radius:0;padding:0;font:13px/1.3 'Inter',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    min-width:70px;min-height:18px;resize:none;text-align:center;overflow:hidden}

  /* ===================== polish pass ===================== */
  :root{ color-scheme:dark;
         /* TradeLocker pakai Inter utk angka juga (tabular figures), bukan monospace */
         --mono:'Inter',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
         --shadow:0 10px 30px rgba(0,0,0,.5); --ring:rgba(59,130,246,.35); }
  body.light{ color-scheme:light; --shadow:0 8px 22px rgba(22,33,55,.12); --ring:rgba(37,99,235,.28); }

  /* angka/data: Inter dgn tabular figures agar rata seperti TradeLocker */
  .clock,.price,.stat .v,#tfinfo,#curprice,#status,table td,input[type=number]{
    font-family:var(--mono); font-feature-settings:"tnum" 1; font-variant-numeric:tabular-nums; }

  /* tinggi kontrol seragam + focus ring jelas */
  .toolbar input,.toolbar select,.toolbar > button{ height:30px; }
  input:focus-visible,select:focus-visible,button:focus-visible,textarea:focus-visible{
    outline:none; border-color:var(--accent); box-shadow:0 0 0 2px var(--ring); }
  ::selection{ background:var(--accent); color:#fff; }

  /* wordmark */
  .brand{ display:inline-flex; align-items:center; gap:8px; font-weight:700; font-size:14px; color:var(--txt); }
  .brand .glyph{ width:24px; height:24px; border-radius:6px; object-fit:cover; display:block;
                 box-shadow:0 0 0 1px var(--border); }
  .vsep{ width:1px; height:20px; background:var(--border); }

  /* toggle jadi ghost button */
  #replayToggle,#bottomToggle{ background:transparent; border-color:transparent; color:var(--muted); padding:4px 9px; }
  #replayToggle:hover,#bottomToggle:hover{ color:var(--txt); background:var(--btn-hover); }

  /* stat cards */
  .stat{ transition:border-color .15s; }
  .stat:hover{ border-color:var(--btn-border-hover); }
  .stat .k{ letter-spacing:.05em; }
  .stat .v{ font-size:18px; letter-spacing:-.01em; }

  /* judul section + accent tick */
  .bp-title,.panel h3{ display:flex; align-items:center; gap:7px; }
  .bp-title::before,.panel h3::before{ content:""; width:3px; height:11px; border-radius:2px; background:var(--accent); flex:none; }

  /* BUY/SELL lebih tegas */
  .bp-trade .buy,.bp-trade .sell{ font-weight:700; letter-spacing:.03em; min-width:76px; }

  /* label data huruf kecil-kapital */
  .rlabel{ text-transform:uppercase; letter-spacing:.05em; font-size:10px; opacity:.85; }

  /* scrollbar tipis bertema */
  .journal-wrap,.bottompanel{ scrollbar-width:thin; scrollbar-color:var(--border) transparent; }
  .journal-wrap::-webkit-scrollbar,.bottompanel::-webkit-scrollbar{ width:10px; height:10px; }
  .journal-wrap::-webkit-scrollbar-thumb,.bottompanel::-webkit-scrollbar-thumb{
    background:var(--border); border-radius:6px; border:3px solid transparent; background-clip:padding-box; }

  .ctxmenu{ box-shadow:var(--shadow); }

  /* badge akun (paper/live) — pemisahan jelas dari mode chart, ala TradingView */
  .acct-badge{ display:inline-flex; align-items:center; gap:5px; height:30px; padding:0 11px; border-radius:7px;
    border:1px solid var(--border); background:var(--btn); color:var(--muted);
    font-size:11px; font-weight:700; letter-spacing:.04em; }
  .acct-badge.demo{ color:var(--accent); }
  .acct-badge.live{ color:var(--green); }
  /* jam + pemilih timezone di pojok kanan-bawah chart (ala TradingView) */
  .tz-clock{ position:absolute; bottom:3px; right:3px; z-index:7; cursor:pointer; user-select:none;
    background:var(--btn); border:1px solid var(--border); color:var(--muted);
    font:600 10px/1 var(--mono); padding:4px 7px; border-radius:5px; white-space:nowrap; }
  .tz-clock:hover{ color:var(--txt); }
  .tz-menu{ position:absolute; bottom:30px; right:3px; z-index:30; display:none;
    background:var(--panel); border:1px solid var(--border); border-radius:8px; box-shadow:var(--shadow);
    max-height:55vh; overflow:auto; min-width:210px; padding:4px; }
  .tz-menu.open{ display:block; }
  .tz-item{ display:flex; align-items:center; gap:8px; padding:6px 9px; border-radius:6px;
    font-size:12px; color:var(--txt); cursor:pointer; white-space:nowrap; }
  .tz-item:hover{ background:var(--btn-hover); }
  .tz-item .ck{ width:13px; color:var(--accent); }
  .tz-item .off{ color:var(--muted); font-family:var(--mono); font-size:11px; min-width:62px; }
  /* kontrol playback hanya tampil saat mode Bar Replay aktif */
  #replayCtrls{ display:contents; }
  .replaybar:not(.replaying) #replayCtrls{ display:none; }

  /* sizing readout (Fase 1a) */
  .sizing{ flex-basis:100%; display:flex; gap:18px; flex-wrap:wrap; font-size:11px; color:var(--muted); margin-top:2px; }
  .sizing b{ font-family:var(--mono); color:var(--accent); }
  .sizing .neg{ color:var(--red); } .sizing .pos{ color:var(--green); }

  /* bar metrik akun (Fase 1b) */
  .acctbar{ display:flex; gap:16px; align-items:center; }
  .acctbar .m{ display:flex; flex-direction:column; line-height:1.15; }
  .acctbar .m i{ color:var(--muted); font-style:normal; font-size:9px; text-transform:uppercase; letter-spacing:.05em; }
  .acctbar .m b{ font-family:var(--mono); font-size:13px; }
  .acctbar .pos{ color:var(--green); } .acctbar .neg{ color:var(--red); }
  .acctbar #resetBtn,.acctbar #closeAllBtn{ font-size:11px; padding:5px 11px; }
  .acctbar #resetBtn{ color:var(--muted); }

  /* order lanjutan (Fase 1c) */
  .adv-row{ flex-basis:100%; display:flex; align-items:flex-end; gap:10px; flex-wrap:wrap; margin-top:2px; }
  .seg-mini{ display:inline-flex; border:1px solid var(--border); border-radius:6px; overflow:hidden; height:30px; }
  .seg-mini button{ border:0; border-radius:0; background:var(--btn); color:var(--muted); padding:0 11px; font-size:11px; font-weight:600; }
  .seg-mini button.on{ background:var(--accent); color:#fff; }
  .chk{ display:inline-flex; align-items:center; gap:5px; font-size:11px; color:var(--muted); height:30px; }

<script>
// ===================== konstanta =====================
const TF_LIST = ['M1','M5','M15','M30','H1','H4','D','W','MN'];
const DUR = {M1:6e4,M5:3e5,M15:9e5,M30:18e5,H1:36e5,H4:1.44e7,D:8.64e7,W:6.048e8,MN:2.63e9}; // ms (MN≈30.44 hari)
const GRAN = {MN:'M'};   // label TF → granularity OANDA (MN = Monthly = 'M')
const FWD_CHUNK = 500;
const NY_TZ = 'America/New_York';
// Zona waktu tampilan (chart X-axis + semua label waktu). Bisa diganti via dropdown #tzSel.
function resolveTZ(v){ return v==='__local' ? (Intl.DateTimeFormat().resolvedOptions().timeZone||NY_TZ) : (v||NY_TZ); }
let chartTZ = resolveTZ(localStorage.getItem('br_tz'));
const $ = s => document.querySelector(s);

// ===================== state =====================
let inst = 'EUR_USD';
const tfData = {};       // { 'M15':[{timestamp,open,high,low,close,volume}], ... } native asc
let currentTF = 'M15';
let T = null;            // cursor time (ms) = close-time candle TF tampil saat ini
let lastLen = -1;
let playing = false, playTimer = null;
let live = false, liveTimer = null;
let trade = null;        // {dir,entry,sl,tp,risk,units,trail,time,lineEntry,lineSL,lineTP}
let pending = null;      // order menunggu harga tersentuh (Fase 1c)
let lotsManual = false;  // true setelah user ubah lot/stepper manual → Risk% berhenti auto-isi lot
let alerts = [];         // price alert: {sym,price,id} (Fase 1d)
let quoteCache = {};     // harga terkini per simbol utk watchlist (candle harian, fallback)
let liveTicks = {};      // bid/ask realtime per simbol dari SSE /api/prices (Lapis 4)
let priceTimerEl = null; // pill countdown candle berikutnya (mode Live)
let axisTimeEl = null;   // label waktu sumbu-X saat hover area future
let formingBar = null;       // candle berjalan (live) yg di-update tiap tick stream
let formingSeed = null;      // candle incomplete OANDA (OHLC otoritatif periode berjalan) → seed wick
let secondaries = [];        // panel chart sekunder (multi-chart, view-only) — diisi setLayout()
let chartLayout = 1;         // jumlah panel: 1 | 2 | 4
let formingTimer = null;     // poll seed forming dari OANDA (lebih sering dari liveRefresh)
let rollRefreshPending = false;
let journal = [];
let drawIds = [];        // overlay drawing
const extending = {};

// ===================== util =====================
function priceDecimals(){ return inst.includes('BTC')?1 : inst.includes('DXY')?3 : inst.includes('JPY')?3 : (inst.includes('XAU')||inst.includes('XAG'))?3 : 5; }
function fmt(p){ return p==null||isNaN(p)?'—':(+p).toFixed(priceDecimals()); }
function nyTime(ms){
  try{
    return new Intl.DateTimeFormat('en-CA',{timeZone:chartTZ,year:'numeric',month:'2-digit',day:'2-digit',
      hour:'2-digit',minute:'2-digit',hour12:false}).format(new Date(ms)).replace(',','');
  }catch(e){ return new Date(ms).toISOString().slice(0,16).replace('T',' '); }
}
// candle terungkap = yang sudah CLOSED pada cursor T (anti-lookahead), via binary search
function revealed(tf){
  const arr=tfData[tf]; if(!arr) return [];
  const d=DUR[tf]; let lo=0,h=arr.length;
  while(lo<h){ const m=(lo+h)>>1; if(arr[m].timestamp+d<=T) lo=m+1; else h=m; }
  return arr.slice(0,lo);
}
function currentCandle(){ const a=revealed(currentTF); return a.length?a[a.length-1]:null; }

// Koordinat pixel tiap titik overlay (rect/trendline/fib/dateRange/text/position).
// DULU: interpolasi sub-bar (x pecahan antar bar) demi presisi dalam-bar. MASALAH: titik
// handle bawaan klinecharts (`needDefaultPointFigure`) SELALU di-snap ke pusat bar
// (timestampToDataIndex→binarySearchNearest→indeks integer). Jadi BENTUK (sub-bar) & HANDLE
// (snapped) bisa meleset s/d ±½ lebar bar → "titik drag bergeser dari pojok" + ukuran tampak
// berubah saat resize (drag klinecharts snap ke bar). SOLUSI: pakai koordinat NATIVE
// klinecharts (identik dengan posisi handle) → bentuk & handle SELALU sinkron, di semua TF.
// Harga/y tetap presisi (value→pixel akurat); hanya x yang ikut grid bar — sama spt TradingView.
function subBarCoords(overlay, coordinates){ return coordinates; }

// [presisi sub-bar] pixel-x → timestamp presisi (interpolasi antar 2 bar tetangga)
function pxToTime(x){
  const arr=revealed(currentTF); if(!arr.length) return null;
  let c=chart.convertFromPixel({x,y:0},{paneId:'candle_pane'}); if(Array.isArray(c)) c=c[0];
  let i = (c&&c.dataIndex!=null)?Math.round(c.dataIndex):(c&&c.timestamp!=null?arr.findIndex(b=>b.timestamp===c.timestamp):null);
  if(i==null||i<0) i=0; if(i>arr.length-1) i=arr.length-1;
  const px=t=>{let p=chart.convertToPixel({timestamp:t,value:0},{paneId:'candle_pane',absolute:true}); if(Array.isArray(p))p=p[0]; return p?p.x:null;};
  const xi=px(arr[i].timestamp);
  let j=(x>=xi)?Math.min(i+1,arr.length-1):Math.max(i-1,0);
  if(j===i||xi==null) return arr[i].timestamp;
  const xj=px(arr[j].timestamp); if(xj==null||xj===xi) return arr[i].timestamp;
  const f=(x-xi)/(xj-xi);
  return Math.round(arr[i].timestamp + f*(arr[j].timestamp-arr[i].timestamp));
}
function pxToValue(y){ let c=chart.convertFromPixel({x:10,y},{paneId:'candle_pane'}); if(Array.isArray(c))c=c[0]; return c?c.value:null; }
// ---- anchor x titik overlay: hybrid timestamp (in-data, durable) / dataIndex (area future) ----
// klinecharts meng-clamp timestamp ke candle terakhir, tapi MENG-EKSTRAPOLASI dataIndex tanpa
// clamp → titik di area kosong kanan WAJIB dibawa sebagai {dataIndex} (tanpa timestamp).
function idxToPx(idx){ let p=chart.convertToPixel({dataIndex:idx,value:0},{paneId:'candle_pane',absolute:true}); if(Array.isArray(p))p=p[0]; return p?p.x:null; }
function tsToPx(t){ let p=chart.convertToPixel({timestamp:t,value:0},{paneId:'candle_pane',absolute:true}); if(Array.isArray(p))p=p[0]; return p?p.x:null; }
function barSpacePx(){ const li=revealed(currentTF).length-1; const a=idxToPx(li), b=idxToPx(li-1); return (a!=null&&b!=null&&a!==b)?(a-b):8; }
// pixel-x → anchor durable: dalam-data → timestamp presisi sub-bar; future → dataIndex fractional
function xAnchorFromPx(x){
  const arr=revealed(currentTF); if(!arr.length) return null;
  const li=arr.length-1, xLast=idxToPx(li), bs=barSpacePx();
  const floatIdx = (xLast!=null)? li + (x-xLast)/bs : li;
  if(floatIdx <= li + 0.0001){ const t=pxToTime(x); return t!=null?{timestamp:t}:null; }   // in-range
  return {dataIndex: floatIdx};                                                              // future
}
// timestamp (virtual bila future) — untuk label/durasi/anchor teks
function tsOf(p){ if(!p) return null; if(p.timestamp!=null) return p.timestamp;
  if(p.dataIndex!=null){ const a=revealed(currentTF); if(!a.length) return null;
    const li=a.length-1; return Math.round(a[li].timestamp + (p.dataIndex-li)*DUR[currentTF]); } return null; }
// objek key x untuk convertToPixel & rebuild point (pertahankan timestamp vs dataIndex)
function keyOf(p){ return (p&&p.timestamp!=null)?{timestamp:p.timestamp}:{dataIndex:p&&p.dataIndex}; }
// float index untuk ordering kiri/kanan & titik tengah
function fidxOf(p){ if(p&&p.dataIndex!=null) return p.dataIndex; const li=revealed(currentTF).length-1, xLast=idxToPx(li), xx=tsToPx(p&&p.timestamp); return (xLast!=null&&xx!=null)? li+(xx-xLast)/barSpacePx() : li; }
function midAnchor(a,b){ if(a.timestamp!=null&&b.timestamp!=null) return {timestamp:Math.round((a.timestamp+b.timestamp)/2)}; return {dataIndex:(fidxOf(a)+fidxOf(b))/2}; }
// snap waktu sub-bar (hasil pxToTime) ke timestamp bar TERDEKAT — dipakai garis vertikal
// supaya penanda waktu = waktu candle yg diklik, dan garis nempel pas di bar itu (jadi
// bisa diklik ulang utk select/hapus). Di luar rentang bar (mis. area future) dibiarkan.
function snapTimeToBar(t){
  const arr=revealed(currentTF); if(!arr.length||t==null) return t;
  if(t<=arr[0].timestamp) return arr[0].timestamp;
  const last=arr[arr.length-1].timestamp; if(t>=last) return last;
  let lo=0,hi=arr.length-1; while(lo<hi){ const m=(lo+hi)>>1; if(arr[m].timestamp<t) lo=m+1; else hi=m; }
  const b=arr[lo].timestamp, a=arr[lo-1]?arr[lo-1].timestamp:b;
  return (t-a<=b-t)?a:b;
}

// [magnet] snap (time,value) ke high/low candle terdekat — pakai data intraday
// terhalus yang ter-load dalam rentang bar saat ini → mendarat di extreme PRESISI.
let magnetOn = (localStorage.getItem('br_magnet')==='1');
const MAGNET_PX = 16;     // radius tarik magnet (px) — "lemah": hanya nempel bila kursor dekat high/low
function finestLoadedTF(){ for(const tf of TF_LIST){ if(tfData[tf]&&tfData[tf].length) return tf; } return currentTF; }
// snap (time,value) ke high/low candle terdekat, TAPI hanya bila kursor (px,py) berada dalam
// radius MAGNET_PX dari extreme itu — di luar radius kembalikan null (titik dibiarkan bebas).
function magnetSnap(time, value, px, py){
  const cur=currentTF, arr=revealed(cur); if(!arr.length) return null;
  let a=0,b=arr.length; while(a<b){const m=(a+b)>>1; if(arr[m].timestamp<=time) a=m+1; else b=m;}
  const i=Math.max(0,a-1), barOpen=arr[i].timestamp, barEnd=barOpen+DUR[cur];
  const ftf=finestLoadedTF();
  const src=(DUR[ftf]<DUR[cur]&&tfData[ftf])?tfData[ftf]:arr;
  let best=null, bestD=Infinity;
  for(const c of src){ if(c.timestamp>=barOpen && c.timestamp<barEnd){
    if(Math.abs(c.high-value)<bestD){bestD=Math.abs(c.high-value); best={timestamp:c.timestamp,value:c.high};}
    if(Math.abs(c.low-value)<bestD){bestD=Math.abs(c.low-value); best={timestamp:c.timestamp,value:c.low};}
  }}
  if(!best){ const c=arr[i]; let bd=Infinity,bv=c.close; for(const v of [c.open,c.high,c.low,c.close]){const d=Math.abs(v-value);if(d<bd){bd=d;bv=v;}} best={timestamp:barOpen,value:bv}; }
  // gate jarak (magnet lemah): bila kursor jauh dari extreme → jangan paksa nempel
  if(best && px!=null && py!=null){
    let cp=chart.convertToPixel({timestamp:best.timestamp,value:best.value},{paneId:'candle_pane',absolute:true}); if(Array.isArray(cp))cp=cp[0];
    if(cp && Math.hypot(px-cp.x, py-cp.y) > MAGNET_PX) return null;
  }
  return best;
}
// [magnet presisi M5] Saat menggambar dgn magnet di TF besar (mis. Daily), high/low hanya
// se-presisi data terhalus yg KEBETULAN ter-load → sering mentok di jam buka candle (mis.
// Daily buka 18:00 NY). Setelah gambar selesai, ambil M5 ON-DEMAND utk rentang tiap candle
// yg di-magnet, lalu geser titik ke menit high/low M5 yg sebenarnya → presisi saat pindah TF.
const m5WinCache={};                    // key: "INST|barOpenMs" → array M5 candle (rentang 1 bar)
function barRangeContaining(tf, ts){    // batas [open,end) bar TF `tf` yang memuat ts (anti-gap weekend)
  const arr=tfData[tf]; if(!arr||!arr.length||ts==null) return null;
  let a=0,b=arr.length; while(a<b){const m=(a+b)>>1; if(arr[m].timestamp<=ts) a=m+1; else b=m;}
  const i=Math.max(0,a-1), open=arr[i].timestamp;
  const end=(i+1<arr.length)?arr[i+1].timestamp:open+DUR[tf];
  return {open,end};
}
async function ensureM5Window(open,end){
  const key=inst+'|'+open; if(m5WinCache[key]) return m5WinCache[key];
  const count=Math.min(5000, Math.ceil((end-open)/DUR.M5)+3);   // from+count (hindari konflik from+to+count OANDA)
  try{ const data=await fetchCandles('M5',{from:new Date(open).toISOString(), count}); m5WinCache[key]=data; return data; }
  catch(e){ return null; }
}
const MAGNET_REFINE_SKIP={rect:1, fib3:1, verticalStraightLine:1, horizontalStraightLine:1}; // box & penanda axis: dilewati
async function refineMagnetPoints(id){
  try{
    const o=chart.getOverlayById(id); if(!o||MAGNET_REFINE_SKIP[o.name]) return;
    if(DUR[currentTF]<=DUR.M5) return;                         // sudah ≤M5 → tak ada gunanya
    const cur=currentTF; if(!tfData[cur]||!tfData[cur].length) return;
    const pts=(o.points||[]).map(p=>({timestamp:p.timestamp,value:p.value}));
    let changed=false;
    for(const p of pts){
      if(p.timestamp==null||p.value==null) continue;
      const rng=barRangeContaining(cur,p.timestamp); if(!rng) continue;
      const m5=await ensureM5Window(rng.open,rng.end); if(!m5||!m5.length) continue;
      let best=null,bd=Infinity;
      for(const c of m5){ if(c.timestamp>=rng.open && c.timestamp<rng.end){
        const dh=Math.abs(c.high-p.value); if(dh<bd){bd=dh; best={timestamp:c.timestamp,value:c.high};}
        const dl=Math.abs(c.low -p.value); if(dl<bd){bd=dl; best={timestamp:c.timestamp,value:c.low };}
      }}
      // hanya refine titik yang memang DEKAT extreme (sudah ter-magnet); titik bebas dibiarkan
      if(best){
        let pp=chart.convertToPixel({timestamp:p.timestamp,value:p.value},{paneId:'candle_pane',absolute:true}); if(Array.isArray(pp))pp=pp[0];
        let bp=chart.convertToPixel({timestamp:best.timestamp,value:best.value},{paneId:'candle_pane',absolute:true}); if(Array.isArray(bp))bp=bp[0];
        if(pp&&bp&&Math.hypot(pp.x-bp.x, pp.y-bp.y) > MAGNET_PX) best=null;
      }
      if(best && (best.timestamp!==p.timestamp || best.value!==p.value)){ p.timestamp=best.timestamp; p.value=best.value; changed=true; }
    }
    if(changed){ try{chart.overrideOverlay({id, points:pts});}catch(e){} }
  }catch(e){}
}
// klik presisi yang dikumpulkan selama menggambar (menggantikan snap-ke-bar klinecharts)
let pendingClicks=[];

// ===== style per-objek gambar (ala TradingView): id → {color,size,style} =====
const DRAW_DEFAULT = {
  trendline:{color:'#4a71ff',size:1,style:'solid'},
  rect:{color:'#4a71ff',size:1,style:'solid'},
  fib3:{color:'#4a71ff',size:1,style:'solid'},
  dateRange:{color:'#4a71ff',size:2,style:'solid'},
  text:{color:'',size:13,style:'solid'},
  horizontalStraightLine:{color:'#4a71ff',size:1,style:'dotted'},  // default dotted, warna bisa diganti
  verticalStraightLine:{color:'#4a71ff',size:1,style:'dotted'},
};
// garis bawaan klinecharts (horizontal/vertical) — pakai styles.line, bukan createPointFigures
const BUILTIN_LINE={horizontalStraightLine:1, verticalStraightLine:1};
function klineLineStyles(st){ const ls=lsLine(st); return {line:Object.assign({color:st.color,size:st.size},ls)}; }
const objStyle = {};   // overlayId -> {color,size,style}
function dstyle(o){ return Object.assign({}, DRAW_DEFAULT[o&&o.name]||{color:'#4a71ff',size:1,style:'solid'}, objStyle[o&&o.id]||{}); }
function setObjStyle(id, patch){
  objStyle[id]=Object.assign({}, objStyle[id]||{}, patch);
  try{ const o=chart.getOverlayById(id); if(!o) return;
    if(BUILTIN_LINE[o.name]) chart.overrideOverlay({id, styles:klineLineStyles(dstyle(o))});
    else chart.overrideOverlay({id, points:o.points});
  }catch(e){}
}
// klinecharts hanya kenal 'solid'/'dashed' → 'dotted' & 'dashed' dipetakan ke dashedValue [dash,gap]
const DASHV={ dashed:[10,8], dotted:[2,7] };
function lsLine(st){ const d=DASHV[st&&st.style]; return d?{style:'dashed',dashedValue:d}:{style:'solid'}; }

// ===================== resize 8-titik (box) untuk rect & fib =====================
// 8 titik: 0 TL · 1 TC · 2 TR · 3 MR · 4 BR · 5 BC · 6 BL · 7 ML
// Lxa/Rxa = anchor x (objek {timestamp}|{dataIndex}) sisi kiri/kanan → kotak bisa melebar ke future.
function writeBox(pts,Lxa,Rxa,T,B){
  const mV=(T+B)/2, mxa=midAnchor(Lxa,Rxa);
  const xa=[Lxa,mxa,Rxa,Rxa,Rxa,mxa,Lxa,Lxa], vy=[T,T,T,mV,B,B,B,mV];
  for(let i=0;i<8;i++) pts[i]=Object.assign({value:vy[i]}, xa[i]);
}
// dipanggil saat salah satu handle di-drag → recompute jadi kotak rapi (tetap axis-aligned)
function boxPressedMove(t){
  const pts=t.points, k=t.performPointIndex, pp=t.performPoint;
  if(!pts||pts.length<8||pp==null) return;
  let Lxa=keyOf(pts[0]), Rxa=keyOf(pts[2]), T=pts[0].value, B=pts[6].value;
  if(k===0||k===6||k===7) Lxa=keyOf(pp);      // sisi kiri
  if(k===2||k===3||k===4) Rxa=keyOf(pp);      // sisi kanan
  if(k===0||k===1||k===2) T=pp.value;         // sisi atas
  if(k===4||k===5||k===6) B=pp.value;         // sisi bawah
  if(fidxOf(Lxa)>fidxOf(Rxa)){ const tmp=Lxa; Lxa=Rxa; Rxa=tmp; }   // jaga kiri<kanan saat lewat sisi seberang
  writeBox(pts,Lxa,Rxa,T,B);
}
// setelah 2 klik (2 titik) → mekarkan jadi 8 titik handle
function expandBox(o){
  if(!o || (o.name!=='rect' && o.name!=='fib3')) return;
  if(!o.points || o.points.length>=8) return;
  const p0=o.points[0], p1=o.points[1];
  if(!p0||!p1||p0.value==null||p1.value==null) return;
  const a0=keyOf(p0), a1=keyOf(p1), left=fidxOf(p0)<=fidxOf(p1);
  const Lxa=left?a0:a1, Rxa=left?a1:a0;
  const T=Math.max(p0.value,p1.value), B=Math.min(p0.value,p1.value);
  const ext = o.name==='fib3' ? {zeroTop:p0.value>=p1.value} : o.extendData;  // fib: arah 0→1 ikut tarikan
  const pts=new Array(8); writeBox(pts,Lxa,Rxa,T,B);
  try{ chart.overrideOverlay({id:o.id, points:pts, extendData:ext}); }catch(e){}
}

// ===================== custom overlay: rectangle/zona =====================
klinecharts.registerOverlay({
  name:'rect', totalStep:3, needDefaultPointFigure:true,
  performEventPressedMove:boxPressedMove,
  createPointFigures:({overlay,coordinates})=>{

  name:'fib3', totalStep:3, needDefaultPointFigure:true,
  performEventPressedMove:boxPressedMove,

    const xL=Math.min(...xs), xR=Math.max(...xs), yTop=Math.min(...ys), yBot=Math.max(...ys);

// custom overlay: Long / Short position (ala TV) — 3 titik independen: Entry, TP, SL.
// TP & SL bisa di-drag sendiri-sendiri; RR dihitung live dari jaraknya.
function posFigures(dir){
  return ({overlay,coordinates,bounding})=>{
    const pts=overlay.points;
    if(!coordinates.length||pts[0].value==null) return [];
    const dec=priceDecimals();
    const pip=parseFloat(document.getElementById('pipSize').value)||0.0001;
    const C=subBarCoords(overlay,coordinates);
    const xs=C.map(c=>c.x);
    let xL=Math.min(...xs), xR=Math.max(...xs);
    if(xR<=xL) xR=(bounding&&bounding.width)?bounding.width:xL+140;
    const F=[];
    const line=(y,c)=>F.push({type:'line',attrs:{coordinates:[{x:xL,y},{x:xR,y}]},styles:{color:c,size:1}});
    const box =(y1,y2,c)=>F.push({type:'rect',attrs:{x:xL,y:Math.min(y1,y2),width:xR-xL,height:Math.abs(y2-y1)},styles:{style:'fill',color:c}});
    const txt =(y,t,c,bl)=>F.push({type:'text',attrs:{x:xL+4,y,text:t,align:'left',baseline:bl||'bottom'},styles:{color:c,size:10}});

    const entry=pts[0].value, yE=C[0].y;
    const haveTP = pts.length>1 && pts[1] && pts[1].value!=null && coordinates.length>1;
    const haveSL = pts.length>2 && pts[2] && pts[2].value!=null && coordinates.length>2;
    if(!haveTP){ line(yE,'#4a71ff'); txt(yE,'Entry '+entry.toFixed(dec),'#4a71ff'); return F; }

    const tp=pts[1].value, yT=C[1].y;
    box(yE,yT,'rgba(84,200,140,0.16)'); line(yT,'#54c88c'); line(yE,'#4a71ff');
    txt(yT,'TP '+tp.toFixed(dec)+'  ('+Math.round(Math.abs(tp-entry)/pip)+'p)','#54c88c');
    if(!haveSL){
      txt(yE,'Entry '+entry.toFixed(dec)+'  ['+dir.toUpperCase()+']  — klik SL','#4a71ff');
      return F;
    }
    const sl=pts[2].value, yS=C[2].y;
    const riskDist=Math.abs(entry-sl), rewDist=Math.abs(tp-entry);
    const rr=riskDist?(rewDist/riskDist):0;
    box(yE,yS,'rgba(255,111,111,0.16)'); line(yS,'#ff6f6f');
    txt(yE,'Entry '+entry.toFixed(dec)+'  ['+dir.toUpperCase()+']  RR 1:'+rr.toFixed(2),'#4a71ff');
    txt(yS,'SL '+sl.toFixed(dec)+'  ('+Math.round(riskDist/pip)+'p)','#ff6f6f','top');
    return F;
  };
}

// custom overlay: Date Range — 2 klik, kotak vertikal + label jumlah bar & durasi (ala TV)
function fmtDur(ms){
  const m=Math.round(ms/6e4);
  if(m<60) return m+'m';
  const h=Math.floor(m/60), mm=m%60;
  if(h<24) return mm? h+'j '+mm+'m' : h+'j';
  const d=Math.floor(h/24), hh=h%24;
  return hh? d+'h '+hh+'j' : d+'h';
}
// jumlah bar antara 2 timestamp = selisih indeks candle di data (akurat thd gap weekend)
function barsBetween(t0,t1){
  const arr=tfData[currentTF];
  if(!arr||!arr.length) return Math.round(Math.abs(t1-t0)/DUR[currentTF]);
  const bs=(t)=>{let a=0,b=arr.length;while(a<b){const m=(a+b)>>1; if(arr[m].timestamp<t) a=m+1; else b=m;} return a;};
  return Math.abs(bs(Math.max(t0,t1))-bs(Math.min(t0,t1)));
}
klinecharts.registerOverlay({
  name:'dateRange', totalStep:3, needDefaultPointFigure:true,
  createPointFigures:({overlay,coordinates})=>{
    if(coordinates.length<2) return [];
    const C=subBarCoords(overlay,coordinates);
    const a=C[0], b=C[1];
    // garis utama + panah di ujung b
    const dx=b.x-a.x, dy=b.y-a.y, L=Math.hypot(dx,dy)||1, ux=dx/L, uy=dy/L;
    const s=10, c=Math.cos(.42), sn=Math.sin(.42);
    const w1x=b.x-s*(ux*c-uy*sn), w1y=b.y-s*(ux*sn+uy*c);
    const w2x=b.x-s*(ux*c+uy*sn), w2y=b.y-s*(-ux*sn+uy*c);
    const st=dstyle(overlay);
    const figs=[
      {type:'line',attrs:{coordinates:[a,b]},styles:Object.assign({color:st.color,size:st.size},lsLine(st))},
      {type:'line',attrs:{coordinates:[b,{x:w1x,y:w1y}]},styles:{color:st.color,size:st.size}},
      {type:'line',attrs:{coordinates:[b,{x:w2x,y:w2y}]},styles:{color:st.color,size:st.size}},
    ];
    const t0=tsOf(overlay.points[0]), t1=tsOf(overlay.points[1]);
    if(t0!=null&&t1!=null){
      const bars=barsBetween(t0,t1);
      const label=bars+' bar · '+fmtDur(bars*DUR[currentTF]);
      const cx=(a.x+b.x)/2, cy=Math.max(a.y,b.y)+16, w=label.length*6.4+14;
      figs.push({type:'rect',attrs:{x:cx-w/2,y:cy-9,width:w,height:18},styles:{style:'fill',color:'#4a71ff'}});
      figs.push({type:'text',attrs:{x:cx,y:cy,text:label,align:'center',baseline:'middle'},styles:{color:'#fff',size:11}});
    }
    return figs;
  }
});

// Zoom HARGA via scroll wheel saat kursor di zona sumbu harga (kanan).
// KLineCharts tak punya API zoom-harga; kita terjemahkan wheel -> drag vertikal di sumbu
// (gesture skala harga bawaan KLineCharts).
const AXIS_ZONE = 70; // lebar perkiraan sumbu harga (px) dari tepi kanan chart
// Pasang zoom-harga via scroll wheel ke satu elemen chart (panel utama & sekunder).
function attachPriceWheelZoom(el){
  el.addEventListener('wheel',(e)=>{
    const rect=el.getBoundingClientRect();
    const xInAxis = (e.clientX-rect.left) > (rect.width-AXIS_ZONE);
    if(!xInAxis) return;                 // di body chart → biarkan zoom waktu default
    e.preventDefault(); e.stopPropagation();
    const tgt=document.elementFromPoint(e.clientX,e.clientY); if(!tgt) return;
    const cx=e.clientX, cy=e.clientY;
    const delta=e.deltaY>0?14:-14;       // scroll bawah = squeeze, atas = stretch
    const mk=(type,y,btn)=> new MouseEvent(type,{bubbles:true,cancelable:true,view:window,clientX:cx,clientY:y,buttons:btn,button:0});
    tgt.dispatchEvent(mk('mousedown',cy,1));
    tgt.dispatchEvent(mk('mousemove',cy+delta,1));
    tgt.dispatchEvent(mk('mouseup',cy+delta,0));
  },{passive:false,capture:true});
}

  localStorage.setItem('br_inst',inst); if(date) localStorage.setItem('br_date',date);
  if(live) stopLive();
  for(const k in tfData) delete tfData[k];
  clearDrawings(); resetTrade();
  chart.setPriceVolumePrecision(priceDecimals(),0);
  setStatus('Fetching '+inst+' '+currentTF+' …');
  try{
    const todayStr=new Date().toISOString().slice(0,10);
    const opt = (latest || !date || date>=todayStr) ? {count:5000} : {count:5000,to:date+'T00:00:00Z'};
    const c = await fetchCandles(currentTF,opt);
    if(!c.length) throw new Error('data kosong');
    tfData[currentTF]=c;
  }catch(e){ setStatus('Failed to load: '+e.message,true); return; }
  const a=tfData[currentTF];
  T = a[a.length-1].timestamp + DUR[currentTF];
  lastLen=-1;
  setStatus(`Loaded ${currentTF}. Next/Play to advance (auto-extend forward). Change TF above the chart.`);
  render(true);
  setReplayUI(false);   // Load → kembali ke realtime (keluar mode replay bila aktif)
  startLive();          // live = default
}

async function fetchCandles(tf,{count,to,from}){
  let u=`/api/candles?instrument=${encodeURIComponent(inst)}&granularity=${GRAN[tf]||tf}&count=${count||5000}`;
  if(to)   u+=`&to=${encodeURIComponent(to)}`;
  if(from) u+=`&from=${encodeURIComponent(from)}`;
  const r=await fetch(u); const j=await r.json();
  if(j.errorMessage) throw new Error(j.errorMessage);
  if(!j.candles) throw new Error('respons tak terduga');
  return j.candles.filter(c=>c.complete).map(c=>({
    timestamp:Date.parse(c.time), open:+c.mid.o, high:+c.mid.h, low:+c.mid.l, close:+c.mid.c, volume:+(c.volume||0),
  })).sort((a,b)=>a.timestamp-b.timestamp);
}
// hanya tampilkan error (merah); pesan info disembunyikan
function setStatus(t,err){ const s=$('#status'); if(err){ s.innerHTML=t; s.style.color='#ff6f6f'; } else { s.innerHTML=''; } }

// ===================== ganti TF (chart tetap 1) =====================
// Titik overlay di area future dibawa via dataIndex (relatif dataset TF saat ini). Saat ganti TF
// dataset berubah → simpan waktu wall-clock (virtual ts) sebelum pindah, lalu petakan ulang ke
// dataIndex TF baru supaya posisi future tetap di waktu yang sama.
function snapshotFuturePoints(){
  const snap=[];
  drawIds.forEach(id=>{ try{ const o=chart.getOverlayById(id); if(!o||!o.points) return;
    o.points.forEach((p,i)=>{ if(p&&p.timestamp==null&&p.dataIndex!=null){ const vt=tsOf(p); if(vt!=null) snap.push({id,i,vt}); } });
  }catch(e){} });
  return snap;
}
function reanchorFuturePoints(snap){
  if(!snap||!snap.length) return;
  const a=revealed(currentTF); if(!a.length) return;
  const li=a.length-1, lt=a[li].timestamp, byId={};
  snap.forEach(s=>{ (byId[s.id]||(byId[s.id]=[])).push(s); });
  Object.keys(byId).forEach(id=>{ try{ const o=chart.getOverlayById(id); if(!o||!o.points) return;
    const pts=o.points.map(p=>Object.assign({},p));
    byId[id].forEach(s=>{ if(pts[s.i]){ delete pts[s.i].timestamp; pts[s.i].dataIndex = li + (s.vt-lt)/DUR[currentTF]; } });
    chart.overrideOverlay({id, points:pts});
  }catch(e){} });
}
async function switchTF(tf){
  if(T==null){ currentTF=tf; localStorage.setItem('br_tf',tf); highlightTF(); setStatus('Load first.'); return; }
  if(!tfData[tf]){
    setStatus('Fetching '+tf+' …');
    try{ tfData[tf]=await fetchCandles(tf,{count:5000,to:new Date(T).toISOString()}); }
    catch(e){ setStatus('Failed TF '+tf+': '+e.message,true); return; }
  }
  const futSnap=snapshotFuturePoints();         // rekam waktu wall-clock titik future (TF lama)
  currentTF=tf; localStorage.setItem('br_tf',tf); highlightTF();
  clearFormingBar(); formingSeed=null;          // candle berjalan TF lama tak berlaku
  if(live) fetchFormingSeed();                   // seed OHLC periode utk TF baru secepatnya
  lastLen=-1; render(true);
  reanchorFuturePoints(futSnap);                 // petakan ulang ke dataIndex TF baru
  setStatus('TF → '+tf);
}

// ===================== render =====================
function render(full){
  if(T==null) return;
  const data=revealed(currentTF);
  if(full || lastLen<0 || data.length<lastLen){ chart.applyNewData(data); }
  else if(data.length>lastLen){ for(let k=lastLen;k<data.length;k++) chart.updateData(data[k]); }
  lastLen=data.length;
  drawTradeLines();
  drawPendingLines();
  drawAlertLines();
  updateOpenTradeBox();
  renderAcct();
  updateOrderBtns();
  refreshLotSuggestion();
  if(live) pushFormingCandle();   // re-append candle berjalan setelah data di-redraw
  updatePriceTimer();
}
// ---- sizing berbasis lot (ala TradeLocker), Risk% sebagai kalkulator ----
function unitsPer(){ return inst.includes('BTC')||inst.includes('XAU')||inst.includes('XAG') ? 1 : 100000; }
function lotUnitName(){ return inst.includes('BTC')?'BTC' : (inst.includes('XAU')||inst.includes('XAG'))?'oz' : 'lots'; }
function lotStepSize(){ return (inst.includes('XAU')||inst.includes('XAG'))?1 : inst.includes('BTC')?0.01 : 0.01; }
function lotDec(){ return inst.includes('BTC')?4 : (inst.includes('XAU')||inst.includes('XAG'))?1 : 2; }
function currentLots(){ return Math.max(0,+$('#lotInput').value||0); }
function setLots(v){ const el=$('#lotInput'); if(el){ el.value=Math.max(0,v).toFixed(lotDec()); } renderOrderPanel(); try{renderSizing();}catch(e){} }
// bid/ask: mode Live + stream tersambung → harga pasar NYATA; selain itu (replay/paper) sintetis dari candle.
function curBidAsk(){
  if(live && priceConnected){ const t=liveTicks[inst]; if(t) return {bid:t.bid, ask:t.ask, mid:(t.bid+t.ask)/2}; }
  const c=currentCandle(); if(!c) return null; const pip=+$('#pipSize').value||instSpec().pip; const s=pip*1.6; return {bid:c.close-s/2, ask:c.close+s/2, mid:c.close};
}
function suggestLotsFromRisk(){
  const cur=currentCandle(); if(!cur) return null;
  const bal=+$('#balance').value||0, rp=+$('#riskPct').value||0;
  const pip=+$('#pipSize').value||instSpec().pip, slp=+$('#slPips').value;
  if(!(slp>0)) return null;
  const u=unitsFromRisk(bal,rp,cur.close,cur.close-slp*pip);
  return u/unitsPer();
}
function refreshLotSuggestion(){ if(lotsManual||trade) return; const s=suggestLotsFromRisk(); if(s!=null) setLots(s); }
// harga dgn pemisah ribuan (ala TradeLocker): 4,117.74 / 1.14088
function fmtPx(p){ if(p==null||isNaN(p)) return '—';
  return (+p).toLocaleString('en-US',{minimumFractionDigits:priceDecimals(),maximumFractionDigits:priceDecimals()}); }
const usdGrp=v=>'$'+v.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
// render ticket order: simbol, tab arah, exec button, SL/TP sub, Init. Margin
function updateOrderBtns(){ renderOrderPanel(); }
function renderOrderPanel(){
  const sym=$('#op2Sym'); if(sym) sym.textContent=inst.replace('_','');
  const lu=$('#lotUnit'); if(lu) lu.textContent=lotUnitName();
  const cur=currentCandle(), ba=curBidAsk();

  const bal=+$('#balance').value||0, lots=currentLots(), units=lots*unitsPer();
  const isSell=orderDir==='short';
  // entry acuan: harga eksekusi (ask utk buy, bid utk sell)

    ex.textContent = entry!=null ? `${isSell?'SELL':'BUY'} ${lots.toFixed(lotDec())} @ ${fmtPx(entry)}` : (isSell?'SELL':'BUY'); }
  // SL/TP sub-label ($ / %)
  if(entry!=null){
    const slDist=slp*pip, sl=isSell?entry+slDist:entry-slDist, tp=isSell?entry-slDist*rr:entry+slDist*rr;
    const loss=Math.abs(pnlUsd(orderDir,entry,sl,units)), rew=Math.abs(pnlUsd(orderDir,entry,tp,units));
    const slEl=$('#slSub'), tpEl=$('#tpSub');
    if(slEl) slEl.textContent = $('#slOn').checked ? `${fmtPx(sl)} · −${usdGrp(loss)} / −${bal?(loss/bal*100).toFixed(2):'0.00'}%` : 'nonaktif';
    if(tpEl) tpEl.textContent = $('#tpOn').checked ? `${fmtPx(tp)} · +${usdGrp(rew)} / +${bal?(rew/bal*100).toFixed(2):'0.00'}%` : 'nonaktif';
  }

    if(cur){ const margin=units*cur.close*quoteToUsd(cur.close)/100;   // leverage 100
      mEl.innerHTML=`Init. Margin: <b>~${usdGrp(margin)}</b> <span class="muted">(${bal?(margin/bal*100).toFixed(2):'0.00'}%)</span>`;
    } else mEl.textContent='Init. Margin: —'; }
}

// ===================== replay control =====================
function step(d){
  if(T==null) return;
  if(!replayMode){ stopLive(); setReplayUI(true); }   // stepping = masuk mode Bar Replay
  const arr=tfData[currentTF], dur=DUR[currentTF];
  let lo=0,h=arr.length;
  while(lo<h){ const m=(lo+h)>>1; if(arr[m].timestamp+dur<=T) lo=m+1; else h=m; }
  const idx=lo-1;
  if(d>0){
    if(idx+1>=arr.length){ autoExtend(currentTF); pauseIfNoData(); return; }
    const ni=idx+1; T=arr[ni].timestamp+dur;
    onNewBar(arr[ni]);
    if(arr.length-ni<30) autoExtend(currentTF);
  }else{
    if(idx<=0) return;
    T=arr[idx-1].timestamp+dur;
  }
  render();
}
function pauseIfNoData(){ if(playing){ pause(); setStatus('Pulling data forward… press Play again.'); } }
$('#nextBtn').onclick=()=>step(1);
$('#prevBtn').onclick=()=>step(-1);
$('#playBtn').onclick=togglePlay;
$('#replayToggle').onclick=()=>{ const b=$('#replaybar'); const c=b.classList.toggle('collapsed'); $('#replayToggle').textContent=c?'⏶':'⏷'; };
$('#bottomToggle').onclick=()=>{ const b=$('#bottompanel'); const c=b.classList.toggle('collapsed'); $('#bottomToggle').textContent=c?'⏶':'⏷'; localStorage.setItem('br_bottomHidden',c?'1':''); chart.resize(); if(!c) drawEquity(); };
window.addEventListener('resize',()=>{ try{drawEquity();}catch(e){} });
// pulihkan kondisi hide/unhide terakhir — default hidden (collapse kecuali user pernah set tampil '0')
if(localStorage.getItem('br_bottomHidden')!=='0'){ $('#bottompanel').classList.add('collapsed'); $('#bottomToggle').textContent='⏶'; }
$('#speed').onchange=()=>{ if(playing){pause();play();} };
function togglePlay(){ playing?pause():play(); }
function play(){ if(T==null)return; if(!replayMode){ stopLive(); setReplayUI(true); } playing=true; $('#playBtn').textContent='⏸'; playTimer=setInterval(()=>step(1),1000/(+$('#speed').value)); }
function pause(){ playing=false; $('#playBtn').textContent='▶'; clearInterval(playTimer); }

// ===================== auto-extend forward =====================
async function autoExtend(tf){
  if(extending[tf]) return;
  const arr=tfData[tf]; if(!arr||!arr.length) return;
  extending[tf]=true;
  try{
    const from=new Date(arr[arr.length-1].timestamp+1000).toISOString();
    const more=await fetchCandles(tf,{count:FWD_CHUNK,from});
    const last=arr[arr.length-1].timestamp;
    const fresh=more.filter(c=>c.timestamp>last);
    if(fresh.length){ arr.push(...fresh); render(); }
    else setStatus('Already at the latest OANDA data for '+tf+'.');
  }catch(e){ setStatus('Auto-extend failed: '+e.message,true); }
  finally{ extending[tf]=false; }
}

// ===================== live auto-refresh (interval menyesuaikan TF) =====================
const LIVE_MIN = 10000, LIVE_MAX = 300000;   // poll: min 10 dtk, maks 5 mnt
// interval ≈ seperempat periode TF, dibatasi [10dtk, 5mnt]
function liveInterval(tf){ return Math.min(LIVE_MAX, Math.max(LIVE_MIN, DUR[tf]/4)); }
function liveLabel(ms){ return ms>=60000 ? (ms/60000).toFixed(ms%60000?1:0)+'m' : (ms/1000)+'s'; }

// Live = default (realtime); tak ada tombol on/off. start/stop dipakai internal:
// start saat data dimuat / keluar replay, stop saat masuk replay.
function startLive(){
  if(T==null) return;
  live=true;
  scheduleLive();
  fetchFormingSeed();                                   // seed OHLC periode berjalan secepatnya
  clearInterval(formingTimer); formingTimer=setInterval(fetchFormingSeed, 5000);
  updatePriceTimer();
}
function stopLive(){
  live=false; clearTimeout(liveTimer); liveTimer=null;
  clearInterval(formingTimer); formingTimer=null; formingSeed=null;
  clearFormingBar();
  if(T!=null){ lastLen=-1; render(true); }   // buang candle berjalan dari chart
  updatePriceTimer();
}
// Ambil candle INCOMPLETE OANDA (count=2 → [complete terakhir, forming]) sbg basis OHLC
// periode berjalan. Ini memuat high/low yang sudah terjadi SEBELUM klien mulai streaming
// (mis. wick atas di awal jam) — yang tak bisa direkonstruksi dari tick mid saja.
async function fetchFormingSeed(){
  if(!live || marketClosed()) return;
  const tf=currentTF, sym=inst;
  try{
    const r=await fetch(`/api/candles?instrument=${encodeURIComponent(sym)}&granularity=${GRAN[tf]||tf}&count=2`);
    const j=await r.json();
    if(tf!==currentTF || sym!==inst || !j.candles) return;     // TF/pair keburu ganti
    const inc=j.candles.find(c=>c.complete===false);
    formingSeed = inc ? {tf, inst:sym, candle:{
      timestamp:Date.parse(inc.time), open:+inc.mid.o, high:+inc.mid.h, low:+inc.mid.l, close:+inc.mid.c, volume:+(inc.volume||0)
    }} : null;
  }catch(e){}
}
// setTimeout (bukan setInterval) agar interval ikut berubah saat TF diganti
function scheduleLive(){
  clearTimeout(liveTimer);
  liveTimer=setTimeout(async()=>{
    if(!live) return;
    try{ await liveRefresh(); }catch(e){}
    if(live) scheduleLive();
  }, liveInterval(currentTF));
}
async function liveRefresh(){
  const tf=currentTF, arr=tfData[tf];
  if(!arr||!arr.length) return;
  const oldLast = arr[arr.length-1].timestamp;
  const atEdge  = T >= oldLast + DUR[tf];   // cursor menempel di candle terakhir → ikut maju
  await autoExtend(tf);
  if(tf!==currentTF) return;                 // TF keburu diganti saat fetch
  const a=tfData[tf];
  const fresh = a.filter(c=>c.timestamp>oldLast);
  if(!fresh.length) return;                  // belum ada candle baru yang close
  if(atEdge){
    fresh.forEach(c=>onNewBar(c));             // cek pending + SL/TP pada candle baru
    T = a[a.length-1].timestamp + DUR[tf];
    lastLen=-1; render(true);
  }
  // jika tidak atEdge: candle ikut tersimpan diam-diam, user tetap di posisi review-nya
}

// ===================== sizing & P&L (Fase 1a) — akun USD =====================
// Spec instrumen: pip & mata uang quote. Konversi P&L ke USD:
//   quote USD  → faktor 1 (exact)              ·  pair USD_* → 1/price (exact)
//   cross JPY  → asumsi USD/JPY (approx; cross-rate penuh = Fase 2)
const INSTRUMENT = {
  EUR_USD:{pip:0.0001,quote:'USD'}, GBP_USD:{pip:0.0001,quote:'USD'}, AUD_USD:{pip:0.0001,quote:'USD'},
  USD_CAD:{pip:0.0001,quote:'CAD'}, USD_JPY:{pip:0.01,quote:'JPY'},
  GBP_JPY:{pip:0.01,quote:'JPY'},   EUR_JPY:{pip:0.01,quote:'JPY'},
  XAU_USD:{pip:0.1,quote:'USD'},    XAG_USD:{pip:0.001,quote:'USD'},   BTC_USD:{pip:1,quote:'USD'},
  DXY:{pip:0.01,quote:'USD'},
};
const APPROX_USDJPY = 157;   // fallback cross JPY (akun USD; cross-rate penuh menyusul di Fase 2)
function instSpec(){ return INSTRUMENT[inst] || {pip:+$('#pipSize').value||0.0001, quote:'USD'}; }
// nilai 1 unit mata uang quote dalam USD pada harga `price`
function quoteToUsd(price){
  const q=instSpec().quote;
  if(q==='USD') return 1;
  if(inst.startsWith('USD_')) return price>0 ? 1/price : 0;   // USD_JPY, USD_CAD: price = quote per USD
  if(q==='JPY') return 1/APPROX_USDJPY;                        // cross JPY (approx)
  return 1;
}
// ukuran posisi (unit base) agar kerugian saat SL kena = balance·risk%
function unitsFromRisk(balance, riskPct, entry, sl){
  const riskUsd = balance*riskPct/100;
  const perUnitUsd = Math.abs(entry-sl) * quoteToUsd(entry);   // USD per 1 unit base
  return perUnitUsd>0 ? riskUsd/perUnitUsd : 0;
}
// P&L dalam USD untuk posisi `units` unit base
function pnlUsd(dir,entry,exit,units){
  const mul = dir==='long'?1:-1;
  return (exit-entry)*mul*units*quoteToUsd(exit);
}
function lotLabel(units){
  if(inst.includes('BTC')) return units.toFixed(4)+' BTC';
  if(inst.includes('XAU')||inst.includes('XAG')) return units.toFixed(1)+' oz';
  return (units/100000).toFixed(2)+' lot';
}
// readout ukuran posisi: pakai trade aktif kalau ada, kalau tidak → preview dari input
function renderSizing(){
  const box=$('#sizingBox'); if(!box) return;
  const bal=+$('#balance').value||0, rp=+$('#riskPct').value||0;
  let entry,sl,tp,dir;
  if(trade){ entry=trade.entry; sl=trade.sl; tp=trade.tp; dir=trade.dir; }
  else{
    const cur=currentCandle(); if(!cur){ box.innerHTML=''; return; }
    const pip=+$('#pipSize').value||instSpec().pip, slp=+$('#slPips').value, rr=+$('#rr').value;
    entry=cur.close; dir='long'; sl=entry-slp*pip; tp=entry+slp*pip*rr;
  }
  const units = trade ? (trade.units||0) : currentLots()*unitsPer();   // sizing berbasis lot
  const riskUsd=Math.abs(pnlUsd(dir,entry,sl,units));
  const rewUsd=Math.abs(pnlUsd(dir,entry,tp,units));
  const rr = Math.abs(entry-sl)>0 ? Math.abs(tp-entry)/Math.abs(entry-sl) : 0;
  const pctRisk = bal? riskUsd/bal*100 : 0;
  box.innerHTML =
    `<span>Size: <b>${lotLabel(units)}</b> · ${Math.round(units).toLocaleString('en-US')} u</span>`+
    `<span>Risk: <b class="neg">$${riskUsd.toFixed(2)}</b> (${pctRisk.toFixed(2)}%)</span>`+
    `<span>Reward: <b class="pos">$${rewUsd.toFixed(2)}</b></span>`+
    `<span>R:R <b>1:${rr.toFixed(2)}</b></span>`+
    (trade?'':`<span style="opacity:.7">(preview — entry = current price, dir long)</span>`);
}

// ===================== trade (drag garis) =====================
function openTrade(dir){
  if(T==null||trade) return;
  const cur=currentCandle(); if(!cur) return;
  const ba=curBidAsk();
  const entry = ba ? (dir==='short'?ba.bid:ba.ask) : cur.close;   // eksekusi di bid (sell) / ask (buy)
  const pip=+$('#pipSize').value, slp=+$('#slPips').value, rr=+$('#rr').value;
  const dist=slp*pip;
  const slOn=$('#slOn').checked, tpOn=$('#tpOn').checked;
  const sl = slOn ? (dir==='long'?entry-dist:entry+dist) : null;
  const tp = tpOn ? (dir==='long'?entry+dist*rr:entry-dist*rr) : null;
  trade={dir,entry,sl,tp,risk:dist,units:currentLots()*unitsPer(),
         trail: $('#trailOn').checked ? (+$('#trailPips').value||0)*pip : 0,
         time:cur.timestamp,lineEntry:null,lineSL:null,lineTP:null};
  drawTradeLines(); updateOpenTradeBox(); renderAcct(); renderSizing();
}
// pindahkan 1 garis overlay tanpa membuat ulang (untuk trailing & drag pending)
function moveLine(id,value){ if(id==null) return; try{ chart.overrideOverlay({id, points:[{value}]}); }catch(e){} }
function hline(value,color,onMove){
  return chart.createOverlay({
    name:'horizontalStraightLine', points:[{value}],
    styles:{ line:{ color, style:'dashed', size:1 } },
    onPressedMoving:(e)=>{ const v=e.overlay.points[0].value; if(v!=null) onMove(+v); return false; },
  });
}
// label + warna per garis trade dari state terkini ($/% relatif balance)
function tradeLineInfo(kind){
  if(!trade) return {color:'#888',text:''};
  const dec=priceDecimals(), units=trade.units||0, bal=+$('#balance').value||0, cur=currentCandle();
  if(kind==='entry'){ const pnl=cur?pnlUsd(trade.dir,trade.entry,cur.close,units):0;
    return {color:'#4a71ff', text:`Entry ${trade.entry.toFixed(dec)}   ${pnl>=0?'+':'-'}$${Math.abs(pnl).toFixed(2)}`}; }
  if(kind==='sl'){ const loss=Math.abs(pnlUsd(trade.dir,trade.entry,trade.sl,units)), pct=bal?loss/bal*100:0;
    return {color:'#ff6f6f', text:`SL ${trade.sl.toFixed(dec)}   -$${loss.toFixed(2)} / -${pct.toFixed(2)}%`}; }
  const rew=Math.abs(pnlUsd(trade.dir,trade.entry,trade.tp,units)), pctt=bal?rew/bal*100:0;
  return {color:'#54c88c', text:`TP ${trade.tp.toFixed(dec)}   +$${rew.toFixed(2)} / +${pctt.toFixed(2)}%`};
}
function tradeLevel(kind,value){
  const info=tradeLineInfo(kind);
  return chart.createOverlay({ name:'tradeLevel', points:[{value}], extendData:{kind,color:info.color,label:info.text},
    onPressedMoving:(e)=>{ const v=e.overlay.points[0]&&e.overlay.points[0].value; if(v==null||!trade) return false;
      if(kind==='entry') trade.entry=v; else if(kind==='sl'){ trade.sl=v; recalcRisk(); } else if(kind==='tp') trade.tp=v;
      const ni=tradeLineInfo(kind); try{chart.overrideOverlay({id:e.overlay.id,extendData:{kind,color:ni.color,label:ni.text}});}catch(_){}
      updateOpenTradeBox(); return false; },
  });
}
function drawTradeLines(){
  ['lineEntry','lineSL','lineTP'].forEach(k=>{ if(trade&&trade[k]){ try{chart.removeOverlay(trade[k]);}catch(e){} trade[k]=null; }});
  if(!trade) return;
  trade.lineEntry=tradeLevel('entry',trade.entry);
  trade.lineSL   = trade.sl!=null ? tradeLevel('sl',trade.sl) : null;
  trade.lineTP   = trade.tp!=null ? tradeLevel('tp',trade.tp) : null;
}
function recalcRisk(){
  if(!trade) return;
  // lot tetap (sizing berbasis lot ala TradeLocker) — geser SL hanya ubah jarak risiko/$ & R, bukan ukuran lot
  if(trade.sl!=null) trade.risk=Math.abs(trade.entry-trade.sl)||trade.risk;
}
function checkTrade(c){
  if(!trade) return;
  let exit=null;
  if(trade.dir==='long'){ if(trade.sl!=null && c.low<=trade.sl) exit=trade.sl; else if(trade.tp!=null && c.high>=trade.tp) exit=trade.tp; }
  else{ if(trade.sl!=null && c.high>=trade.sl) exit=trade.sl; else if(trade.tp!=null && c.low<=trade.tp) exit=trade.tp; }
  if(exit!==null){ closeTrade(exit,c.timestamp); return; }
  // trailing stop: rapatkan SL ke arah profit utk bar berikutnya (pakai ekstrem bar yang sudah close)
  if(trade.trail>0 && trade.sl!=null){
    const ns = trade.dir==='long' ? c.high-trade.trail : c.low+trade.trail;
    const better = trade.dir==='long' ? ns>trade.sl : ns<trade.sl;
    if(better){ trade.sl=ns; moveLine(trade.lineSL,trade.sl); }
  }
}

// ---------- pending order (limit/stop) ----------
function placePending(dir){
  if(T==null){ setStatus('Load first.',true); return; }
  if(trade){ setStatus('Close position first (one position at a time).',true); return; }
  if(pending){ setStatus("There's already a pending — cancel it first.",true); return; }
  const cur=currentCandle(); if(!cur) return;
  const entry=+$('#pendEntry').value;
  if(!entry){ setStatus('Enter the pending Entry price first.',true); return; }
  const pip=+$('#pipSize').value, slp=+$('#slPips').value, rr=+$('#rr').value, dist=slp*pip;
  const slOn=$('#slOn').checked, tpOn=$('#tpOn').checked;
  const sl = slOn ? (dir==='long'?entry-dist:entry+dist) : null;
  const tp = tpOn ? (dir==='long'?entry+dist*rr:entry-dist*rr) : null;
  const type = dir==='long' ? (entry<cur.close?'limit':'stop') : (entry>cur.close?'limit':'stop');
  pending={dir,type,entry,sl,tp,risk:dist,units:currentLots()*unitsPer(),
           trail: $('#trailOn').checked ? (+$('#trailPips').value||0)*pip : 0,
           lineEntry:null,lineSL:null,lineTP:null};
  drawPendingLines(); updateOpenTradeBox();
  setStatus(dir.toUpperCase()+' '+type+' pending @ '+fmt(entry)+' — waiting for price to be touched.');
}
function drawPendingLines(){
  ['lineEntry','lineSL','lineTP'].forEach(k=>{ if(pending&&pending[k]){ try{chart.removeOverlay(pending[k]);}catch(e){} pending[k]=null; }});
  if(!pending) return;
  // drag Entry → geser SL & TP dengan delta yang sama (jaga jarak)
  pending.lineEntry=hline(pending.entry,'#4a71ff',v=>{ const d=v-pending.entry; pending.entry=v;
    if(pending.sl!=null){ pending.sl+=d; moveLine(pending.lineSL,pending.sl); }
    if(pending.tp!=null){ pending.tp+=d; moveLine(pending.lineTP,pending.tp); } });
  if(pending.sl!=null) pending.lineSL=hline(pending.sl,'#ff6f6f',v=>{ pending.sl=v; });
  if(pending.tp!=null) pending.lineTP=hline(pending.tp,'#54c88c',v=>{ pending.tp=v; });
}
function clearPendingLines(){ if(!pending) return; ['lineEntry','lineSL','lineTP'].forEach(k=>{ if(pending[k]){ try{chart.removeOverlay(pending[k]);}catch(e){} }}); }
function cancelPending(){ if(!pending) return; clearPendingLines(); pending=null; updateOpenTradeBox(); setStatus('Pending cancelled.'); }
function checkPending(c){
  if(!pending || trade) return;
  if(!(c.low<=pending.entry && pending.entry<=c.high)) return;   // belum tersentuh
  clearPendingLines();
  trade={dir:pending.dir,entry:pending.entry,sl:pending.sl,tp:pending.tp,risk:pending.risk,
         units:pending.units,trail:pending.trail,time:c.timestamp,lineEntry:null,lineSL:null,lineTP:null};
  pending=null;
  drawTradeLines(); updateOpenTradeBox();
  toast('✓ Pending executed @ '+fmt(trade.entry));
}
// ---------- partial close ----------
function partialClose(frac){
  if(!trade) return;
  const cur=currentCandle(); if(!cur) return;
  const units=(trade.units||0)*frac, exit=cur.close, mul=trade.dir==='long'?1:-1;
  const pnlCcy=pnlUsd(trade.dir,trade.entry,exit,units);
  const r=((exit-trade.entry)*mul/(trade.risk||1e-9))*frac;
  let bal=(+$('#balance').value||0)+pnlCcy; $('#balance').value=bal.toFixed(2); localStorage.setItem('br_balance',bal.toFixed(2));
  journal.push({time:trade.time,exitTime:cur.timestamp,dir:trade.dir,entry:trade.entry,exit,r,units,pnlCcy,balanceAfter:bal,partial:true});
  trade.units-=units;
  saveJournal(); renderStats(); renderJournal(); updateOpenTradeBox(); renderAcct();
  setStatus('Partial close '+Math.round(frac*100)+'% @ '+fmt(exit)+'.');
}
function closeTrade(exit,time){
  if(!trade) return;
  const mul=trade.dir==='long'?1:-1;
  const r=(exit-trade.entry)*mul/(trade.risk||1e-9);
  const units=trade.units||0;
  const pnlCcy=pnlUsd(trade.dir,trade.entry,exit,units);
  let bal=(+$('#balance').value||0)+pnlCcy;             // ledger: balance maju sesuai realized P&L
  $('#balance').value=bal.toFixed(2); localStorage.setItem('br_balance',bal.toFixed(2));
  journal.push({time:trade.time,exitTime:time,dir:trade.dir,entry:trade.entry,exit,r,units,pnlCcy,balanceAfter:bal});
  ['lineEntry','lineSL','lineTP'].forEach(k=>{ if(trade[k]){ try{chart.removeOverlay(trade[k]);}catch(e){} }});
  trade=null;
  saveJournal(); renderStats(); renderJournal(); updateOpenTradeBox(); renderAcct();
}

async function spSync(){
  if(!spActive()) return;
  try{
    const [a,p,j] = await Promise.all([
      fetch('/api/account').then(r=>r.ok?r.json():null),
      fetch('/api/positions').then(r=>r.ok?r.json():null),
      fetch('/api/journal').then(r=>r.ok?r.json():null),
    ]);

    if(p) SP.positions=p.positions||[];
    if(j) SP.closed=j.trades||[];
  }catch(e){}

}

function spRenderStats(){
  const J=SP.closed, n=J.length, wins=J.filter(t=>t.pnlCcy>0).length;
  const gW=J.filter(t=>t.pnlCcy>0).reduce((s,t)=>s+t.pnlCcy,0);
  const gL=Math.abs(J.filter(t=>t.pnlCcy<0).reduce((s,t)=>s+t.pnlCcy,0));
  const net=J.reduce((s,t)=>s+t.pnlCcy,0);
  $('#stTrades').textContent=n;
  $('#stWin').textContent=n?Math.round(wins/n*100)+'%':'—';
  const rEl=$('#stR'); rEl.textContent='—'; rEl.className='v';                 // R butuh SL (n/a di paper market)
  $('#stPF').textContent=gL?(gW/gL).toFixed(2):(gW?'∞':'—');
  const netEl=$('#stNet'); if(n){ netEl.textContent=(net>=0?'+$':'-$')+Math.abs(net).toFixed(2); netEl.className='v '+(net>=0?'pos':'neg'); } else { netEl.textContent='—'; netEl.className='v'; }
  const recs=J.slice().reverse().filter(t=>t.balanceAfter!=null);             // SP.closed terbaru dulu → kronologis
  let dd=0; if(recs.length){ let peak=recs[0].balanceAfter-(recs[0].pnlCcy||0); recs.forEach(t=>{ peak=Math.max(peak,t.balanceAfter); dd=Math.max(dd,peak-t.balanceAfter); }); }
  $('#stDD').textContent=recs.length?'$'+dd.toFixed(2):'—';
  $('#stExp').textContent='—';
  // equity curve dari balanceAfter (kronologis)
  const cv=$('#equityCurve'); if(cv){ const ctx=cv.getContext('2d'), dpr=window.devicePixelRatio||1, w=cv.clientWidth||300, h=cv.clientHeight||96;
    cv.width=w*dpr; cv.height=h*dpr; ctx.setTransform(dpr,0,0,dpr,0,0); ctx.clearRect(0,0,w,h);
    if(!recs.length){ ctx.fillStyle=getCSS('--muted'); ctx.font='11px ui-monospace'; ctx.fillText('Belum ada trade selesai.',8,h/2); }
    else { const start=recs[0].balanceAfter-(recs[0].pnlCcy||0), pts=[start,...recs.map(r=>r.balanceAfter)];
      const mn=Math.min(...pts), mx=Math.max(...pts), rng=(mx-mn)||1, X=i=>2+i/(pts.length-1||1)*(w-4), Y=v=>h-5-(v-mn)/rng*(h-10);
      ctx.strokeStyle=getCSS('--border'); ctx.setLineDash([4,4]); ctx.beginPath(); ctx.moveTo(0,Y(start)); ctx.lineTo(w,Y(start)); ctx.stroke(); ctx.setLineDash([]);
      ctx.strokeStyle=getCSS('--accent'); ctx.lineWidth=1.6; ctx.beginPath(); pts.forEach((v,i)=> i?ctx.lineTo(X(i),Y(v)):ctx.moveTo(X(i),Y(v))); ctx.stroke(); }
  }
}

function editTextOverlay(o){ if(o && o.name==='text') openOverlayTextEditor(o,true); }     // 'text': kosong = hapus
function editShapeText(o){ if(o && (o.name==='rect'||o.name==='trendline')) openOverlayTextEditor(o,false); } // bentuk tetap walau teks kosong
// lokasi (client px) tempat teks dirender → editor muncul persis di situ (in-place)
function overlayTextAnchor(o){
  const rect=$('#chart').getBoundingClientRect();
  const toPx=p=>{ let px=null; try{ px=chart.convertToPixel(Object.assign(keyOf(p),{value:p.value}),{paneId:'candle_pane',absolute:true}); }catch(e){} if(Array.isArray(px)) px=px[0]; return px; };
  const pts=o.points||[];
  if(o.name==='trendline' && pts.length>=2){ const a=toPx(pts[0]), b=toPx(pts[1]); if(a&&b) return {x:rect.left+(a.x+b.x)/2, y:rect.top+(a.y+b.y)/2}; }
  // rect: tengah kotak (2 sudut berlawanan — TL & BR bila sudah 8 titik, atau 2 titik awal)
  if(o.name==='rect' && pts.length>=2){ const a=toPx(pts[0]), b=toPx(pts[pts.length>=8?4:1]); if(a&&b) return {x:rect.left+(a.x+b.x)/2, y:rect.top+(a.y+b.y)/2}; }
  const p=pts[0]; if(!p) return null; const px=toPx(p);
  return {x:rect.left+(px?px.x:rect.width/2), y:rect.top+(px?px.y:rect.height/2)};
}
function openOverlayTextEditor(o, removeIfEmpty){
  if(!o) return;
  const a=overlayTextAnchor(o); if(!a) return;
  const x=a.x, y=a.y;

  if(textEditorEl){ try{textEditorEl.remove();}catch(e){} textEditorEl=null; }
  const ta=document.createElement('textarea');
  ta.className='text-editor'; ta.value=o.extendData||''; ta.rows=1;
  ta.style.left=Math.round(x)+'px'; ta.style.top=Math.round(y-20)+'px'; ta.style.transform='translateX(-50%)';
  document.body.appendChild(ta); textEditorEl=ta;
  ta.focus(); ta.select();

  let done=false;
  const close=(save)=>{
    if(done) return; done=true;
    try{ta.remove();}catch(e){} if(textEditorEl===ta) textEditorEl=null;
    const fresh=(o.extendData==null||o.extendData==='');
    if(save){
      const v=ta.value;
      if(v.trim()===''){ if(removeIfEmpty){ try{chart.removeOverlay(o.id);}catch(e){} } else { try{chart.overrideOverlay({id:o.id,extendData:''});}catch(e){} } }
      else { try{chart.overrideOverlay({id:o.id,extendData:v});}catch(e){} }
    }else if(fresh && removeIfEmpty){ try{chart.removeOverlay(o.id);}catch(e){} }  // batal saat baru (khusus Text)
  };
  const grow=()=>{ ta.style.height='auto'; ta.style.height=ta.scrollHeight+'px'; };
  ta.addEventListener('input',grow); grow();
  ta.addEventListener('keydown',ev=>{
    ev.stopPropagation();                              // Enter = baris baru (perilaku textarea default)
    if(ev.key==='Escape'){ ev.preventDefault(); close(false); }
  });
  ta.addEventListener('blur',()=>close(true));         // simpan saat klik ke tempat lain
}

const DEFAULT_POS_RR = 3;  // klik tool → klik 1x di chart → posisi 1:3, lalu bisa di-adjust
// risk default = rata-rata range candle (ATR sederhana) TF aktif → ukuran selalu proporsional TF
function tfDefaultRisk(){
  const arr=revealed(currentTF), n=arr.length;
  if(n>=2){
    const k=Math.min(14,n); let sum=0;
    for(let i=n-k;i<n;i++) sum += (arr[i].high-arr[i].low);
    const avg=sum/k; if(avg>0) return avg;
  }
  return (parseFloat($('#slPips').value)||20)*(parseFloat($('#pipSize').value)||0.0001); // fallback
}
// 5 titik: 0 Entry · 1 TP · 2 SL · 3 handle-lebar-kiri · 4 handle-lebar-kanan.
function expandPosition(o){
  if(!o || (o.name!=='longPosition' && o.name!=='shortPosition')) return;
  if(!o.points || o.points.length>=5) return;          // sudah di-expand
  const p0=o.points[0]; if(!p0 || p0.value==null) return;
  const dir=o.name==='longPosition'?'long':'short';
  const entry=p0.value;
  const risk=tfDefaultRisk();
  const sl=dir==='long'? entry-risk : entry+risk;
  const tp=dir==='long'? entry+DEFAULT_POS_RR*risk : entry-DEFAULT_POS_RR*risk;
  // sisi kanan = 15 bar ke kanan; bila melewati candle terakhir → pakai dataIndex (area future, tak ter-clamp)
  const Lxa=keyOf(p0), li=revealed(currentTF).length-1, Rxa=(fidxOf(p0)+15>li)?{dataIndex:fidxOf(p0)+15}:{timestamp:tsOf(p0)+15*DUR[currentTF]};
  try{ chart.overrideOverlay({ id:o.id, points:[
    Object.assign({value:entry},Lxa), Object.assign({value:tp},Rxa), Object.assign({value:sl},Rxa),
    Object.assign({value:tp},Lxa),    Object.assign({value:entry},Rxa) ] }); }
  catch(e){ setStatus('Position expand error: '+e.message,true); }
}
// Entry/TP/SL = drag vertikal (level); handle kiri/kanan = drag horizontal (lebar waktu).
function posPressedMove(t){
  const pts=t.points, k=t.performPointIndex, pp=t.performPoint;
  if(!pts||pts.length<5||pp==null) return;
  let entry=pts[0].value, tp=pts[1].value, sl=pts[2].value;
  let tL=keyOf(pts[0]), tR=keyOf(pts[1]);
  if(k===0) entry=pp.value;            // Entry: hanya level
  else if(k===1) tp=pp.value;          // TP: hanya level
  else if(k===2) sl=pp.value;          // SL: hanya level
  else if(k===3) tL=keyOf(pp);         // handle kiri: hanya lebar
  else if(k===4) tR=keyOf(pp);         // handle kanan: hanya lebar
  pts[0]=Object.assign({value:entry}, tL);
  pts[1]=Object.assign({value:tp}, tR);
  pts[2]=Object.assign({value:sl}, tR);
  pts[3]=Object.assign({value:tp}, tL);     // di sisi kiri, sejajar garis TP (tak menimpa Entry)
  pts[4]=Object.assign({value:entry}, tR);  // di sisi kanan, sejajar garis Entry
}

// ===================== stats & journal =====================
function renderStats(){
  if(spActive()){ spRenderStats(); return; }   // statistik live = server
  const n=journal.length, wins=journal.filter(t=>t.r>0).length;
  const totR=journal.reduce((s,t)=>s+t.r,0);
  const gW=journal.filter(t=>t.r>0).reduce((s,t)=>s+t.r,0);
  const gL=Math.abs(journal.filter(t=>t.r<0).reduce((s,t)=>s+t.r,0));
  $('#stTrades').textContent=n;
  $('#stWin').textContent=n?Math.round(wins/n*100)+'%':'—';
  const rEl=$('#stR'); rEl.textContent=(totR>=0?'+':'')+totR.toFixed(1); rEl.className='v '+(totR>=0?'pos':'neg');
  $('#stPF').textContent=gL?(gW/gL).toFixed(2):(gW?'∞':'—');
  // ---- metrik $ (hanya record yang punya pnlCcy/balanceAfter; back-compat record lama dilewati) ----
  const pnlRecs=journal.filter(t=>t.pnlCcy!=null);
  const net=pnlRecs.reduce((s,t)=>s+t.pnlCcy,0);
  const netEl=$('#stNet');
  if(pnlRecs.length){ netEl.textContent=(net>=0?'+$':'-$')+Math.abs(net).toFixed(2); netEl.className='v '+(net>=0?'pos':'neg'); }
  else { netEl.textContent='—'; netEl.className='v'; }
  // max drawdown ($) dari kurva equity
  const recs=journal.filter(t=>t.balanceAfter!=null);
  let dd=0;
  if(recs.length){ const start=recs[0].balanceAfter-(recs[0].pnlCcy||0); let peak=start;
    recs.forEach(t=>{ peak=Math.max(peak,t.balanceAfter); dd=Math.max(dd,peak-t.balanceAfter); }); }
  $('#stDD').textContent=recs.length?'$'+dd.toFixed(2):'—';
  // expectancy = rata-rata R per trade
  $('#stExp').textContent=n?((totR/n>=0?'+':'')+(totR/n).toFixed(2)+'R'):'—';
  drawEquity();
}
function drawEquity(){
  const cv=$('#equityCurve'); if(!cv) return;
  const ctx=cv.getContext('2d'); const dpr=window.devicePixelRatio||1;
  const w=cv.clientWidth||300, h=cv.clientHeight||96;
  cv.width=w*dpr; cv.height=h*dpr; ctx.setTransform(dpr,0,0,dpr,0,0);
  ctx.clearRect(0,0,w,h);
  const recs=journal.filter(t=>t.balanceAfter!=null);
  if(!recs.length){ ctx.fillStyle=getCSS('--muted'); ctx.font='11px ui-monospace';
    ctx.fillText('Belum ada trade selesai (mode $).',8,h/2); return; }
  const start=recs[0].balanceAfter-(recs[0].pnlCcy||0);
  const pts=[start,...recs.map(r=>r.balanceAfter)];
  const mn=Math.min(...pts), mx=Math.max(...pts), rng=(mx-mn)||1;
  const X=i=>2+i/(pts.length-1||1)*(w-4);
  const Y=v=>h-5-(v-mn)/rng*(h-10);
  // baseline modal awal
  ctx.strokeStyle=getCSS('--border'); ctx.setLineDash([4,4]); ctx.beginPath();
  ctx.moveTo(0,Y(start)); ctx.lineTo(w,Y(start)); ctx.stroke(); ctx.setLineDash([]);
  // garis equity
  ctx.strokeStyle=getCSS('--accent'); ctx.lineWidth=1.6; ctx.beginPath();
  pts.forEach((v,i)=> i?ctx.lineTo(X(i),Y(v)):ctx.moveTo(X(i),Y(v))); ctx.stroke();
}
function getCSS(v){ return getComputedStyle(document.body).getPropertyValue(v).trim()||'#4a71ff'; }
// bar metrik akun: Balance (realized) · Open P/L (floating) · Equity
function renderAcct(){
  if(spActive()){ spRenderAcct(); return; }   // akun live = server
  const bal=+$('#balance').value||0;
  let openPnl=0;
  if(trade){ const cur=currentCandle(); if(cur) openPnl=pnlUsd(trade.dir,trade.entry,cur.close,trade.units||0); }
  const eq=bal+openPnl;
  const usd=v=>'$'+v.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
  $('#acBal').textContent=usd(bal);
  const o=$('#acOpen'); o.textContent=(openPnl>=0?'+':'-')+usd(Math.abs(openPnl)); o.className=openPnl>=0?'pos':'neg';
  $('#acEq').textContent=usd(eq);
  let margin=0; if(trade){ margin=(trade.units||0)*trade.entry*quoteToUsd(trade.entry)/100; }   // leverage 100
  const m=$('#acMargin'); if(m) m.textContent=usd(margin);
  const fm=$('#acFree'); if(fm) fm.textContent=usd(eq-margin);
}
