let activeTradeTab = localStorage.getItem('br_tradeTab') || 'positions';

const sideCls = d => d==='long'?'t-side-buy':'t-side-sell';
const sideTxt = d => d==='long'?'Buy':'Sell';
function thRow(cols){ return '<tr>'+cols.map(c=>`<th>${c}</th>`).join('')+'</tr>'; }
function emptyRow(span,msg){ return `<tr><td class="tp-empty" colspan="${span}">${msg}</td></tr>`; }

function renderTrades(){
  if(spActive()){ spRenderTrades(); return; }   // posisi/closed live = server
  // jumlah di tab
  $('#tpNPos').textContent  = trade?1:0;
  $('#tpNPend').textContent = pending?1:0;
  // aktifkan tab + pane
  document.querySelectorAll('#tpTabs button').forEach(b=>b.classList.toggle('on', b.dataset.tab===activeTradeTab));
  const isStats = activeTradeTab==='stats';
  $('#paneTable').hidden = isStats;
  $('#paneStats').hidden = !isStats;
  if(isStats){ try{renderStats();}catch(e){} return; }

  const head=$('#tpHead'), body=$('#tpBody');
  const sym=inst.replace('_','');
  const cur=currentCandle();
  if(activeTradeTab==='positions'){
    head.innerHTML=thRow(['Instrument','Side','Size','Entry / Market','Stop Loss','Take Profit','Margin','Profit & Loss','Actions']);
    if(!trade){ body.innerHTML=emptyRow(9,'No open positions'); return; }
    const mkt=cur?cur.close:trade.entry;
    const pl=pnlUsd(trade.dir,trade.entry,mkt,trade.units||0);
    const margin=(trade.units||0)*trade.entry*quoteToUsd(trade.entry)/100;
    body.innerHTML=`<tr>
      <td><b>${sym}</b></td>
      <td class="${sideCls(trade.dir)}">${sideTxt(trade.dir)}</td>
      <td>${lotLabel(trade.units||0)}</td>
      <td>${fmt(trade.entry)} / ${fmt(mkt)}</td>
      <td>${fmt(trade.sl)}</td>
      <td>${fmt(trade.tp)}</td>
      <td>${usdFmt(margin)}</td>
      <td class="${pl>=0?'t-pos':'t-neg'}">${pl>=0?'+':''}${usdFmt(pl)}</td>
      <td class="t-act"><button data-act="partial">Close ½</button><button data-act="close">Close</button></td></tr>`;
  } else if(activeTradeTab==='pending'){
    head.innerHTML=thRow(['Instrument','Side','Type','Entry','Stop Loss','Take Profit','Size','Actions']);
    if(!pending){ body.innerHTML=emptyRow(8,'No pending orders'); return; }
    body.innerHTML=`<tr>
      <td><b>${sym}</b></td>
      <td class="${sideCls(pending.dir)}">${sideTxt(pending.dir)}</td>
      <td style="text-transform:capitalize">${pending.type}</td>
      <td>${fmt(pending.entry)}</td>
      <td>${fmt(pending.sl)}</td>
      <td>${fmt(pending.tp)}</td>
      <td>${lotLabel(pending.units||0)}</td>
      <td class="t-act"><button data-act="cancel">Cancel</button></td></tr>`;
  } else { // closed
    head.innerHTML=thRow(['Instrument','Side','Size','Entry','Exit','R','Profit & Loss','Closed (NY)']);
    if(!journal.length){ body.innerHTML=emptyRow(8,'No closed positions'); return; }
    body.innerHTML=journal.slice().reverse().map(t=>`<tr>
      <td><b>${sym}</b></td>
      <td class="${sideCls(t.dir)}">${sideTxt(t.dir)}${t.partial?' ½':''}</td>
      <td>${t.units!=null?lotLabel(t.units):'—'}</td>
      <td>${fmt(t.entry)}</td>
      <td>${fmt(t.exit)}</td>
      <td class="${t.r>0?'t-pos':'t-neg'}">${t.r>0?'+':''}${t.r.toFixed(2)}R</td>
      <td class="${(t.pnlCcy||0)>=0?'t-pos':'t-neg'}">${t.pnlCcy!=null?((t.pnlCcy>=0?'+':'')+usdFmt(t.pnlCcy)):'—'}</td>
      <td style="color:var(--muted)">${nyTime(t.exitTime||t.time).slice(5)}</td></tr>`).join('');
  }
}

// quote harga terkini (candle harian: candle terakhir = hari berjalan/incomplete = harga live)
async function fetchQuote(sym){
  try{
    const r=await fetch(`/api/candles?instrument=${encodeURIComponent(sym)}&granularity=D&count=2`);
    const j=await r.json(); if(!j.candles||!j.candles.length) return null;
    const cs=j.candles, c0=cs[cs.length-1], last=+c0.mid.c, prev=cs.length>1?+cs[cs.length-2].mid.c:last;
    return {last, chg: prev?(last-prev)/prev*100:0, hi:+c0.mid.h, lo:+c0.mid.l};
  }catch(e){ return null; }
}
async function refreshQuotes(){
  await Promise.all(WATCH_SYMS.map(async s=>{ const q=await fetchQuote(s); if(q) quoteCache[s]=q; }));
  renderWatch();
}
function pipOf(s){ return Math.pow(10, -(symDecimals(s)-1)); }   // pip per simbol (FX 1e-4, JPY 1e-2, dst)
function renderWatch(){
  const box=$('#wlRows'); if(!box) return;
  const hdr=`<div class="wl-row wl-hdr">
    <span class="wl-sym">Instruments</span><span>Bid</span><span>Ask</span><span>Spread</span><span>Day&nbsp;Hi</span><span>Day&nbsp;Lo</span></div>`;
  const rows=WATCH_SYMS.map(s=>{
    const q=quoteCache[s], lt=liveTicks[s], dec=symDecimals(s), pip=pipOf(s), sym=s.replace('_','');
    if(!q && !lt) return `<div class="wl-row ${s===inst?'on':''}" data-sym="${s}">
      <span class="wl-sym">${sym}</span><span class="wl-bid">—</span><span class="wl-ask">—</span><span class="wl-spr">—</span><span class="wl-num">—</span><span class="wl-num">—</span></div>`;
    let bid, ask, sprd;
    if(lt){ bid=lt.bid; ask=lt.ask; sprd=ask-bid; }                 // bid/ask realtime
    else { sprd=pip*1.6; bid=q.last-sprd/2; ask=q.last+sprd/2; }    // fallback sintetis dari candle harian
    const chg=q?q.chg:0, up=chg>=0;
    const hi=q&&q.hi!=null?q.hi.toFixed(dec):'—', lo=q&&q.lo!=null?q.lo.toFixed(dec):'—';
    return `<div class="wl-row ${s===inst?'on':''}" data-sym="${s}" title="${(chg>=0?'+':'')+chg.toFixed(2)}% today">
      <span class="wl-sym">${sym}</span>
      <span class="wl-bid ${up?'up':'down'}">${bid.toFixed(dec)}</span>
      <span class="wl-ask ${up?'up':'down'}">${ask.toFixed(dec)}</span>
      <span class="wl-spr">${(sprd/pip).toFixed(1)}</span>
      <span class="wl-num">${hi}</span>
      <span class="wl-num">${lo}</span></div>`;
  }).join('');
  box.innerHTML=hdr+rows;

// ===================== live price stream (SSE /api/prices) =====================
// Satu EventSource → semua simbol watchlist. Throttle render via rAF (tick bisa
// berkali-kali/detik saat pasar ramai). Reconnect manual berbackoff (EventSource
// tak selalu auto-reconnect, mis. saat respons non-200/503).
let priceES=null, priceConnected=false, priceBackoff=1000, priceRenderQueued=false;
function setLiveDot(){ const d=$('#wlLive'); if(d){ d.classList.toggle('on',priceConnected); d.title=priceConnected?'Live price connected':'Live price disconnected'; } }
function queuePriceRender(){
  if(priceRenderQueued) return; priceRenderQueued=true;
  requestAnimationFrame(()=>{ priceRenderQueued=false;
    if(!$('#watchlist').classList.contains('hidden')) renderWatch();
    if(live){ pushFormingCandle(); renderOrderPanel(); updatePriceTimer(); }  // gerak chart+panel tiap tick (Live)
    secondaries.forEach(sc=>{ try{ sc.tick(); }catch(e){} });                  // panel sekunder gerak tiap tick
  });
}
function connectPriceStream(){
  try{ if(priceES) priceES.close(); }catch(e){}
  priceES=new EventSource('/api/prices');
  priceES.onopen=()=>{ priceConnected=true; priceBackoff=1000; setLiveDot(); };
  priceES.onmessage=(e)=>{
    let t; try{ t=JSON.parse(e.data); }catch(_){ return; }
    if(!t||!t.instrument) return;
    liveTicks[t.instrument]={bid:t.bid, ask:t.ask, time:t.time};
    if(!priceConnected){ priceConnected=true; setLiveDot(); }
    queuePriceRender();
  };
  priceES.onerror=()=>{
    priceConnected=false; setLiveDot();
    try{ priceES.close(); }catch(e){}                 // ambil alih reconnect sepenuhnya
    setTimeout(connectPriceStream, priceBackoff);
    priceBackoff=Math.min(priceBackoff*2, 30000);
  };
}

// ===================== countdown candle berikutnya (mode Live) =====================
function fmtCountdown(ms){
  let s=Math.max(0,Math.floor(ms/1000));
  const d=Math.floor(s/86400); s-=d*86400;
  const h=Math.floor(s/3600);  s-=h*3600;
  const m=Math.floor(s/60);    s-=m*60;
  const p2=n=>String(n).padStart(2,'0');
  if(d>0) return d+'d '+p2(h)+':'+p2(m)+':'+p2(s);
  if(h>0) return p2(h)+':'+p2(m)+':'+p2(s);
  return p2(m)+':'+p2(s);
}
// tutup candle TF aktif = open candle terakhir + durasi; lompati boundary yg sudah lewat
// (mis. data live belum sempat fetch candle baru) agar hitung mundur tak nyangkut di 00:00.
function nextCandleEnd(){
  const c=currentCandle(); if(!c) return null;
  const dur=DUR[currentTF]; let end=c.timestamp+dur, now=Date.now();
  while(end<=now) end+=dur;
  return end;
}
// pasar dianggap tutup bila tick harga simbol aktif basi (OANDA bekukan waktu
// tick saat tutup, mis. akhir pekan) → countdown tak relevan.
function marketClosed(){
  const t=liveTicks[inst];
  if(t && t.time){ const age=Date.now()-Date.parse(t.time); if(age>300000) return true; } // >5 mnt
  return false;
}
function updatePriceTimer(){
  const el=priceTimerEl; if(!el) return;
  const c=currentCandle(), end=nextCandleEnd();
  // hanya saat mode Live (realtime) — sembunyikan di replay/tanpa data
  if(!live || c==null || end==null){ el.style.display='none'; return; }
  // ikuti harga candle berjalan (bergerak tiap tick) bila ada
  const bar=(formingBar && formingBar.timestamp>c.timestamp)?formingBar:c;
  let p=chart.convertToPixel({timestamp:bar.timestamp, value:bar.close},{paneId:'candle_pane',absolute:true});
  if(Array.isArray(p)) p=p[0];
  if(!p || p.y==null){ el.style.display='none'; return; }
  // pasar tutup / libur → sembunyikan (countdown tak relevan)
  if(marketClosed()){ el.style.display='none'; return; }
  // taruh DI BAWAH label harga klinecharts (jangan tumpang tindih); clamp di area chart
  const H=$('#chart').clientHeight||0, y=Math.max(0,Math.min(p.y+12, H-22));
  el.textContent='⏱ '+fmtCountdown(end-Date.now());
  el.style.top=y+'px';
  el.style.display='block';
}
// Label waktu di sumbu-X saat hover area future (candle belum terbentuk). klinecharts
// hanya menandai waktu di atas bar yang ADA; area kosong di kanan tak diberi label →
// hitung waktu proyeksi dari grid bar terakhir & tampilkan label sendiri.
function updateAxisTime(e){
  const el=axisTimeEl; if(!el) return;
  const rect=$('#chart').getBoundingClientRect();
  const x=e.clientX-rect.left, y=e.clientY-rect.top;
  if(x<0||x>rect.width||y<0||y>rect.height){ el.style.display='none'; return; }
  let cc=chart.convertFromPixel({x,y:0},{paneId:'candle_pane'}); if(Array.isArray(cc)) cc=cc[0];
  const di=cc&&cc.dataIndex!=null?cc.dataIndex:null;
  const dl=chart.getDataList(); if(di==null||!dl.length){ el.style.display='none'; return; }
  const lastIdx=dl.length-1;
  if(di<=lastIdx+0.5){ el.style.display='none'; return; }  // di atas bar nyata → klinecharts sudah menandai
  const off=Math.round(di-lastIdx);                         // berapa bar ke depan
  const ts=dl[lastIdx].timestamp + off*DUR[currentTF];
  el.textContent=nyTime(ts);
  el.style.left=x+'px';
  // top-align ke atas band sumbu-X — sama persis dgn pill crosshair klinecharts
  el.style.top=chartAxisTop()+'px';
  el.style.display='block';
}

// ===================== forming candle (live, gerak tiap tick) =====================
function liveMid(){ const t=liveTicks[inst]; return (t && isFinite(t.bid) && isFinite(t.ask))?(t.bid+t.ask)/2:null; }
// fetch candle complete yg baru tutup, agar periode forming berikutnya bisa mulai (debounce).
function scheduleRollRefresh(){
  if(rollRefreshPending || !live) return;
  rollRefreshPending=true;
  setTimeout(async()=>{ rollRefreshPending=false; if(live){ try{ await liveRefresh(); }catch(e){} } }, 800);
}
// Update/append candle berjalan dari harga stream. Hanya saat Live & pasar buka.
// Periode forming = tepat setelah candle complete terakhir (grid = DUR). Begitu periode
// lewat, biarkan liveRefresh menarik candle complete (OHLC otoritatif) lalu mulai periode baru.
function pushFormingCandle(){
  if(!live || marketClosed()) return;
  const last=currentCandle(); if(!last) return;   // candle terakhir yg DITAMPILKAN (sinkron dgn render → anti-gap)
  const mid=liveMid(); if(mid==null) return;
  const dur=DUR[currentTF], now=Date.now();
  // forming SELALU tepat 1 bar setelah candle terakhir (jangan lompat periode → tak ada gap waktu);
  // open = close candle sebelumnya (tak ada gap harga).
  const openTs=last.timestamp+dur;
  if(now<openTs) return;                            // periode forming belum mulai
  if(now>=openTs+dur) scheduleRollRefresh();         // periode sudah lewat → tarik candle complete (jangan skip bar)
  // Basis OHLC: candle incomplete OANDA utk periode ini (high/low otoritatif, memuat
  // wick awal-periode) bila tersedia; jika tidak → sintesis dari close terakhir.
  const seed = (formingSeed && formingSeed.tf===currentTF && formingSeed.inst===inst
                && formingSeed.candle.timestamp===openTs) ? formingSeed.candle : null;
  if(!formingBar || formingBar.timestamp!==openTs){
    const o = seed ? seed.open : last.close;
    const hi = seed ? seed.high : last.close;
    const lo = seed ? seed.low  : last.close;
    formingBar={timestamp:openTs, open:o, high:Math.max(hi,mid), low:Math.min(lo,mid), close:mid, volume:seed?seed.volume:0};
  } else {
    formingBar.close=mid;
    // gabungkan ekstrem OANDA (otoritatif) + tick live — high/low monotonik dlm periode
    const hi = seed ? Math.max(seed.high, formingBar.high) : formingBar.high;
    const lo = seed ? Math.min(seed.low,  formingBar.low)  : formingBar.low;
    formingBar.high = Math.max(hi, mid);
    formingBar.low  = Math.min(lo, mid);
    if(seed) formingBar.open = seed.open;            // open otoritatif dari OANDA
  }
  try{ chart.updateData(formingBar); }catch(e){}
}
function clearFormingBar(){ formingBar=null; }

function setReplayUI(on){
  replayMode=on;
  $('#replaybar').classList.toggle('replaying', on);
  replayBtn.classList.toggle('on', on);
  replayBtn.textContent = on ? '⏹ Exit Replay' : '⏮ Bar Replay';
  replayBtn.title = on ? 'Exit replay → back to realtime' : 'Pick replay start point directly on the chart';
  applyPaperMode();   // replay → client-side; realtime → akun live server
}
function exitReplay(){
  pickMode=false;
  setReplayUI(false);
  const arr=tfData[currentTF];
  if(arr&&arr.length) T=arr[arr.length-1].timestamp+DUR[currentTF];   // lompat ke bar terbaru
  lastLen=-1; render(true);
  startLive();                       // kembali realtime (default)
  setStatus('');
}
replayBtn.onclick=()=>{
  if(replayMode){ exitReplay(); return; }              // sedang replay → keluar ke realtime
  if(T==null){ setStatus('Load first.',true); return; }
  pickMode=!pickMode; replayBtn.classList.toggle('on',pickMode);
  if(pickMode){
    chart.applyNewData(tfData[currentTF]); lastLen=tfData[currentTF].length;  // tampilkan semua bar
    setStatus('Bar Replay: point & CLICK a bar on the chart to pick the replay start.');
  }else{ render(true); setStatus('Point selection cancelled.'); }
};
const REPLAY_SCROLL_MS=700;   // durasi animasi geser ke bar yang dipilih
$('#chart').addEventListener('click',()=>{
  if(!pickMode||hoverTs==null) return;
  const ts=hoverTs;
  pickMode=false;
  stopLive();                        // replay = realtime mati
  setReplayUI(true);                 // masuk mode replay → kontrol step tampil
  setStatus('Replay from '+nyTime(ts)+' (NY) …');
  // animasi: bar yang diklik meluncur ke tepi kanan (semua bar masih tampil),
  // lalu setelah animasi selesai data dipotong di titik itu → transisi mulus tanpa lompat.
  try{ chart.scrollToTimestamp(ts, REPLAY_SCROLL_MS); }catch(e){}
  setTimeout(()=>{ T=ts+DUR[currentTF]; lastLen=-1; render(true);
    setStatus('Replay from '+nyTime(ts)+' (NY). Next/Play to advance.'); }, REPLAY_SCROLL_MS+30);
});

  }); }catch(e){}
  const c=document.querySelector('.center'), ch=document.getElementById('chart');
  if(c) c.style.background=bg; if(ch) ch.style.background=bg;
}

$('#chart').addEventListener('contextmenu',e=>{
  e.preventDefault();
  if(hoverId){ const o=chart.getOverlayById(hoverId); if(o&&DRAW_DEFAULT[o.name]!==undefined){ hideCtx(); showObjPopup(o, e.clientX, e.clientY); return; } }
  const rect=$('#chart').getBoundingClientRect();
  const yIn=e.clientY-rect.top;
  const price=pxToValue(yIn);
  const items=[];
  if(price!=null && !isNaN(price)){
    // deteksi alert dekat kursor (pita ±6px) → tawarkan hapus
    const pa=pxToValue(yIn-6), pb=pxToValue(yIn+6);
    let nearIdx=-1;
    if(pa!=null && pb!=null){ const lo=Math.min(pa,pb), hi=Math.max(pa,pb);
      nearIdx=alerts.findIndex(a=>a.sym===inst && a.price>=lo && a.price<=hi); }
    if(nearIdx>=0) items.push({label:`✕ Delete alert @ ${alerts[nearIdx].price}`, fn:()=>removeAlert(nearIdx)});
    items.push({label:`🔔 Create alert at ${(+price).toFixed(priceDecimals())}`, fn:()=>createAlertAt(price)});
  }
  items.push({label:'↺ Reset chart view', fn:resetChartView});
  showCtx(e.clientX, e.clientY, items);
});

// ===================== multi-chart (panel sekunder, view-only) =====================
// Panel utama (#chart, slot 0) = chart penuh (trading/drawing/replay). Panel sekunder
// (slot 1..) = chart ringan: hanya tampilkan candle + lilin live simbol/TF sendiri.
// Tanpa drawing/trading. Double-click header → muat simbol+TF-nya ke panel utama.
const SEC_DEFAULTS=['GBP_USD','USD_JPY','XAU_USD'];
function savedSecConfig(){ try{ const a=JSON.parse(localStorage.getItem('br_sec')||'[]'); return Array.isArray(a)?a:[]; }catch(e){ return []; } }
function persistSec(){ try{ localStorage.setItem('br_sec', JSON.stringify(secondaries.map(s=>({sym:s.sym,tf:s.tf})))); }catch(e){} }

function makeSecondary(slot){
  const panel=document.createElement('div'); panel.className='cpanel'; panel.dataset.slot=slot;
  const hd=document.createElement('div'); hd.className='cpanel-hd';
  const sel=document.createElement('select'); sel.className='cp-sym';
  WATCH_SYMS.forEach(s=>{ const o=document.createElement('option'); o.value=s; o.textContent=s.replace('_','/'); sel.appendChild(o); });
  const tfs=document.createElement('span'); tfs.className='cp-tfs';
  TF_LIST.forEach(tf=>{ const b=document.createElement('button'); b.className='cp-tf'; b.dataset.tf=tf; b.textContent=TF_LABEL[tf]||tf; tfs.appendChild(b); });
  const last=document.createElement('span'); last.className='cp-last';
  const act=document.createElement('button'); act.className='cp-act'; act.textContent='⌖';
  act.title='Jadikan panel aktif (trading & drawing pindah ke sini)';
  hd.appendChild(sel); hd.appendChild(tfs); hd.appendChild(last); hd.appendChild(act);
  const cdiv=document.createElement('div'); cdiv.className='cp-chart';
  panel.appendChild(hd); panel.appendChild(cdiv);

  const light=document.body.classList.contains('light');
  const c=klinecharts.init(cdiv,{styles:light?lightStyles:darkStyles, timezone:chartTZ});
  attachPriceWheelZoom(cdiv);   // zoom harga via scroll di sumbu (sama spt panel utama)
  const ro=new ResizeObserver(()=>{ try{c.resize();}catch(e){} }); ro.observe(cdiv);

  const sc={ slot, panel, chart:c, el:cdiv, selEl:sel, tfsEl:tfs, lastEl:last,
    sym:'EUR_USD', tf:'M15', data:[], forming:null, ro, rollTimer:null,
    highlightTF(){ tfs.querySelectorAll('button').forEach(b=>b.classList.toggle('on',b.dataset.tf===this.tf)); },
    setSymTF(sym,tf){ this.sym=sym; this.tf=tf; },
    async load(){
      sel.value=this.sym; this.highlightTF(); this.forming=null;
      try{
        const u=`/api/candles?instrument=${encodeURIComponent(this.sym)}&granularity=${GRAN[this.tf]||this.tf}&count=2000`;
        const r=await fetch(u); const j=await r.json();
        if(!j.candles) return;
        this.data=j.candles.filter(x=>x.complete).map(x=>({timestamp:Date.parse(x.time),open:+x.mid.o,high:+x.mid.h,low:+x.mid.l,close:+x.mid.c,volume:+(x.volume||0)})).sort((a,b)=>a.timestamp-b.timestamp);
        try{ this.chart.setPriceVolumePrecision(decimalsFor(this.sym),0); }catch(e){}
        this.chart.applyNewData(this.data);
      }catch(e){}
    },
    tick(){
      const t=liveTicks[this.sym]; if(!t) return;
      const mid=(t.bid+t.ask)/2; if(!isFinite(mid)) return;
      this.lastEl.textContent=mid.toFixed(decimalsFor(this.sym));
      if(!this.data.length) return;
      const last=this.data[this.data.length-1];
      const dur=DUR[this.tf], now=Date.now(), openTs=last.timestamp+dur;
      if(now<openTs) return;                       // periode forming belum mulai
      if(now>=openTs+dur){ this.scheduleRoll(); }   // periode lewat → tarik candle complete
      if(!this.forming || this.forming.timestamp!==openTs){
        this.forming={timestamp:openTs,open:last.close,high:Math.max(last.close,mid),low:Math.min(last.close,mid),close:mid,volume:0};
      } else {
        this.forming.close=mid; this.forming.high=Math.max(this.forming.high,mid); this.forming.low=Math.min(this.forming.low,mid);
      }
      try{ this.chart.updateData(this.forming); }catch(e){}
    },
    scheduleRoll(){ if(this.rollTimer) return; this.rollTimer=setTimeout(()=>{ this.rollTimer=null; this.roll(); },1500); },
    async roll(){
      try{
        const u=`/api/candles?instrument=${encodeURIComponent(this.sym)}&granularity=${GRAN[this.tf]||this.tf}&count=3`;
        const r=await fetch(u); const j=await r.json(); if(!j.candles) return;
        const fresh=j.candles.filter(x=>x.complete).map(x=>({timestamp:Date.parse(x.time),open:+x.mid.o,high:+x.mid.h,low:+x.mid.l,close:+x.mid.c,volume:+(x.volume||0)})).sort((a,b)=>a.timestamp-b.timestamp);
        const lastTs=this.data.length?this.data[this.data.length-1].timestamp:0; let added=false;
        fresh.forEach(c=>{ if(c.timestamp>lastTs){ this.data.push(c); try{this.chart.updateData(c);}catch(e){} added=true; } });
        if(added) this.forming=null;
      }catch(e){}
    },
    dispose(){ try{this.ro.disconnect();}catch(e){} if(this.rollTimer)clearTimeout(this.rollTimer); try{klinecharts.dispose(this.el);}catch(e){} try{this.panel.remove();}catch(e){} }
  };

  sel.onchange=()=>{ sc.sym=sel.value; sc.load(); persistSec(); };
  tfs.querySelectorAll('button').forEach(b=> b.onclick=()=>{ sc.tf=b.dataset.tf; sc.highlightTF(); sc.load(); persistSec(); });
  act.onclick=()=>activatePanel(sc);
  hd.ondblclick=(e)=>{ if(e.target===sel || e.target.closest('.cp-tf') || e.target===act) return; activatePanel(sc); };
  return sc;
}

// muat simbol+TF ke chart utama (panel penuh: trading/drawing/replay)
function focusIntoPrimary(sym,tf){
  currentTF=tf; localStorage.setItem('br_tf',tf); highlightTF();
  $('#instrument').value=sym; guessPip(); renderWatch(); loadInit(true);
}
// tukar dua node bersaudara di DOM (posisi grid ikut DOM order)
function swapNodes(a,b){
  if(!a||!b||a===b) return;
  const m=document.createComment(''); a.parentNode.insertBefore(m,a);
  b.parentNode.insertBefore(a,b); m.parentNode.insertBefore(b,m); m.remove();
}
function markActivePanel(){
  document.querySelectorAll('#chartgrid .cpanel').forEach(p=>p.classList.toggle('active', p.classList.contains('cpanel-pri')));
}
// jadikan panel sekunder `sc` sebagai panel AKTIF: panel utama (penuh) pindah ke
// posisi sc & ambil simbol/TF-nya; sc bertukar tempat & menampilkan simbol lama utama.
function activatePanel(sc){
  const grid=$('#chartgrid'), pri=grid.querySelector('.cpanel-pri'); if(!pri) return;
  const oldInst=inst, oldTF=currentTF, newInst=sc.sym, newTF=sc.tf;
  swapNodes(pri, sc.panel);
  sc.setSymTF(oldInst, oldTF); sc.load(); persistSec();   // sekunder ambil simbol lama panel utama
  focusIntoPrimary(newInst, newTF);                        // panel utama ambil simbol panel terpilih
  markActivePanel(); resizeAllCharts();
}
function resizeAllCharts(){ requestAnimationFrame(()=>{ try{chart.resize();}catch(e){} secondaries.forEach(sc=>{try{sc.chart.resize();}catch(e){}}); try{updatePriceTimer();}catch(e){} }); }

function setLayout(n){
  chartLayout=n; localStorage.setItem('br_layout',n);
  const grid=$('#chartgrid'); grid.className='lay-'+n;
  const pri=grid.querySelector('.cpanel-pri'); if(pri) grid.insertBefore(pri, grid.firstChild);  // panel utama balik ke kiri-atas saat ganti layout
  const need=n-1, saved=savedSecConfig();
  while(secondaries.length>need){ secondaries.pop().dispose(); }
  while(secondaries.length<need){
    const idx=secondaries.length, sc=makeSecondary(idx);
    grid.appendChild(sc.panel); secondaries.push(sc);
    const cfg=saved[idx]||{}; sc.setSymTF(cfg.sym||SEC_DEFAULTS[idx]||'EUR_USD', cfg.tf||currentTF); sc.load();
  }
  persistSec();
  $('#layoutbtns').querySelectorAll('button').forEach(b=>b.classList.toggle('on',+b.dataset.n===n));
  markActivePanel(); resizeAllCharts();
}

  setLayout(n);
}

// bootApp = semua inisialisasi yang menyentuh data server (candle, SSE, quotes).
// Dipisah jadi fungsi supaya HANYA dijalankan setelah sesi tervalidasi.
function bootApp(){
  loadAlerts(); renderAlertList(); renderWatch();
  loadJournal(); renderStats(); renderJournal(); renderAcct();
  loadInit();  // auto-load tanggal hari ini saat dibuka
  refreshQuotes(); setInterval(refreshQuotes, 60000);   // watchlist quotes (fallback candle harian)
  setLiveDot(); connectPriceStream();                   // harga realtime via SSE
  initPriceTimer();                                     // countdown candle berikutnya

  applyPaperMode();                                     // boot = realtime → akun live server
}

// Avatar akun di pojok kanan toolbar; klik → dropdown (info + saldo + Logout).
function userInitials(name, email){
  const src=(name||email||'?').trim();
  const parts=src.split(/\s+/).filter(Boolean);
  if(parts.length>=2) return (parts[0][0]+parts[1][0]);
  return (src[0]||'?');
}
// isi avatar: foto Google bila ada (fallback inisial bila kosong / gagal muat)
function setAvatar(elm, pic, ini){
  elm.textContent='';
  if(pic){
    const img=document.createElement('img'); img.src=pic; img.alt=''; img.referrerPolicy='no-referrer';
    img.onerror=()=>{ elm.textContent=ini; };
    elm.appendChild(img);
  } else { elm.textContent=ini; }
}
function onAuthed(u){
  const email = (u && u.email) ? u.email : '';
  const name  = (u && u.name)  ? u.name  : email;
  const pic   = (u && u.picture) ? u.picture : '';
  let el = document.getElementById('userMenu');
  if(!el){
    const bar = document.querySelector('.toolbar');
    el = document.createElement('div'); el.id='userMenu'; el.className='user-menu';
    el.innerHTML =
      '<button class="user-avatar" id="userAvatar" title="Akun"></button>'+
      '<div class="user-pop" id="userPop">'+
      '  <div class="user-pop-head"><div class="user-av-lg" id="userAvLg"></div>'+
      '    <div class="user-pop-id"><div class="user-pop-name" id="userPopName"></div><div class="user-pop-email" id="userPopEmail"></div></div></div>'+
      '  <div class="user-pop-row"><span>Akun</span><b>Demo · Paper</b></div>'+
      '  <div class="user-pop-row"><span>Saldo</span><b id="userPopBal">—</b></div>'+
      '  <button class="user-pop-logout" id="logoutBtn">Logout</button>'+
      '</div>';
    bar.appendChild(el);   // setelah .grow → tertarik ke pojok kanan
    const pop=el.querySelector('#userPop'), av=el.querySelector('#userAvatar');
    av.onclick=(e)=>{ e.stopPropagation();
      const open=!pop.classList.contains('open');
      if(open){ const b=SP.account&&SP.account.balance;
        document.getElementById('userPopBal').textContent = (b!=null)?('$'+(+b).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})):'—'; }
      pop.classList.toggle('open',open);
    };
    pop.addEventListener('click',e=>e.stopPropagation());
    document.addEventListener('click',()=>pop.classList.remove('open'));
    el.querySelector('#logoutBtn').onclick = doLogout;
  }
  const ini=userInitials(name,email);
  setAvatar(el.querySelector('#userAvatar'), pic, ini);
  setAvatar(el.querySelector('#userAvLg'), pic, ini);
  el.querySelector('#userPopName').textContent=name||'—';
  el.querySelector('#userPopEmail').textContent=email;
}
async function doLogout(){
  try{ await fetch('/api/auth/logout',{method:'POST'}); }catch(e){}
  location.reload();
}
// Overlay login/register — muncul bila /api/auth/me balas 401.
function showAuthOverlay(){
  if(document.getElementById('authOverlay')) return;
  const ov = document.createElement('div');
  ov.id = 'authOverlay'; ov.className = 'auth-overlay';
  ov.innerHTML =
    '<form class="auth-card" id="authForm">'+
    '  <div class="auth-brand"><img src="/assets/favicon-32x32.png" width="28" height="28" alt="">Luna Trade</div>'+
    '  <div class="auth-tabs">'+
    '    <button type="button" class="auth-tab active" data-mode="login">Masuk</button>'+
    '    <button type="button" class="auth-tab" data-mode="register">Daftar</button>'+
    '  </div>'+
    '  <label class="auth-field auth-name" style="display:none">Nama<input type="text" id="authName" autocomplete="name"></label>'+
    '  <label class="auth-field">Email<input type="email" id="authEmail" autocomplete="email" required></label>'+
    '  <label class="auth-field">Password<input type="password" id="authPass" autocomplete="current-password" required minlength="8"></label>'+
    '  <div class="auth-err" id="authErr"></div>'+
    '  <button type="submit" class="auth-submit" id="authSubmit">Masuk</button>'+
    '  <div id="googleWrap" style="display:none;flex-direction:column;gap:14px">'+
    '    <div class="auth-or"><span>atau</span></div>'+
    '    <button type="button" class="auth-google" id="googleBtn">'+
    '      <svg width="18" height="18" viewBox="0 0 48 48" aria-hidden="true"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>'+
    '      Lanjutkan dengan Google</button>'+
    '  </div>'+
    '</form>';
  document.body.appendChild(ov);
  let mode = 'login';
  const tabs = ov.querySelectorAll('.auth-tab');
  const nameField = ov.querySelector('.auth-name');
  const submit = ov.querySelector('#authSubmit');
  const err = ov.querySelector('#authErr');
  const pass = ov.querySelector('#authPass');
  tabs.forEach(t=>t.onclick=()=>{
    mode = t.dataset.mode;
    tabs.forEach(x=>x.classList.toggle('active', x===t));
    nameField.style.display = mode==='register' ? '' : 'none';
    submit.textContent = mode==='register' ? 'Daftar' : 'Masuk';
    pass.autocomplete = mode==='register' ? 'new-password' : 'current-password';
    err.textContent = '';
  });
  ov.querySelector('#authForm').onsubmit = async (e)=>{
    e.preventDefault(); err.textContent=''; submit.disabled=true;
    const body = { email: ov.querySelector('#authEmail').value.trim(), password: pass.value };
    if(mode==='register') body.name = ov.querySelector('#authName').value.trim();
    try{
      const r = await fetch('/api/auth/'+mode, {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
      const d = await r.json().catch(()=>({}));
      if(r.ok){ location.reload(); return; }   // sesi terset → reload → bootApp jalan
      err.textContent = d.error || 'Gagal — coba lagi';
    }catch(_){ err.textContent = 'Tidak bisa terhubung ke server'; }
    submit.disabled = false;
  };
  ov.querySelector('#authEmail').focus();
  // Tampilkan error dari callback Google (redirect ?auth_error=...), lalu bersihkan URL.
  const qErr = new URLSearchParams(location.search).get('auth_error');
  if(qErr){ err.textContent = qErr; history.replaceState(null,'',location.pathname); }
  // Tampilkan tombol Google hanya bila server mengaktifkannya.
  fetch('/api/auth/config').then(r=>r.json()).then(cfg=>{
    if(cfg && cfg.google){
      ov.querySelector('#googleWrap').style.display = 'flex';
      ov.querySelector('#googleBtn').onclick = ()=>{ location.href = '/api/auth/google'; };
    }
  }).catch(()=>{});
}
// Gerbang: cek sesi dulu. Authed → tampilkan user + bootApp. Tak authed → overlay.
(async function authGate(){
  try{
    const r = await fetch('/api/auth/me');
    if(r.ok){ onAuthed(await r.json()); bootApp(); }
    else { showAuthOverlay(); }
  }catch(e){ showAuthOverlay(); }
})();

// Dropdown zona waktu — pengaruhi chart X-axis + semua label waktu (nyTime).
function applyTimezone(v){
  chartTZ = resolveTZ(v);
  localStorage.setItem('br_tz', v);
  try{ chart.setTimezone(chartTZ); }catch(e){}
  try{ if(T!=null){ lastLen=-1; render(true); } }catch(e){}   // segarkan label overlay (garis vertikal dll)

  try{ updateTzClock(); }catch(e){}
}
// ---- jam + pemilih timezone di pojok kanan-bawah chart (ala TradingView) ----
const TZ_LIST=[
  {tz:'America/New_York',name:'New York'},{tz:'America/Chicago',name:'Chicago'},
  {tz:'America/Sao_Paulo',name:'Sao Paulo'},{tz:'UTC',name:'UTC'},
  {tz:'Europe/London',name:'London'},{tz:'Europe/Berlin',name:'Frankfurt'},
  {tz:'Europe/Moscow',name:'Moscow'},{tz:'Asia/Dubai',name:'Dubai'},
  {tz:'Asia/Kolkata',name:'Mumbai'},{tz:'Asia/Singapore',name:'Singapore'},
  {tz:'Asia/Hong_Kong',name:'Hong Kong'},{tz:'Asia/Tokyo',name:'Tokyo'},
  {tz:'Asia/Jakarta',name:'Jakarta'},{tz:'Australia/Sydney',name:'Sydney'},
];
function tzOffsetLabel(tz){
  try{ const p=new Intl.DateTimeFormat('en-US',{timeZone:tz,timeZoneName:'shortOffset'})
    .formatToParts(new Date()).find(x=>x.type==='timeZoneName'); return (p?p.value:'UTC').replace('GMT','UTC'); }
  catch(e){ return 'UTC'; }
}
function tzClockText(tz){
  try{ return new Intl.DateTimeFormat('en-GB',{timeZone:tz,hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false}).format(new Date()); }
  catch(e){ return '--:--:--'; }
}
const tzClock=document.createElement('div'); tzClock.className='tz-clock'; tzClock.id='tzClock';
const tzMenu=document.createElement('div');  tzMenu.className='tz-menu';  tzMenu.id='tzMenu';
$('#chart').appendChild(tzClock); $('#chart').appendChild(tzMenu);
function updateTzClock(){ tzClock.textContent = tzClockText(chartTZ)+' '+tzOffsetLabel(chartTZ); }
function buildTzMenu(){
  const localTz=Intl.DateTimeFormat().resolvedOptions().timeZone||NY_TZ;
  const items=TZ_LIST.concat([{tz:localTz,name:'Local',raw:'__local'}]);
  tzMenu.innerHTML=items.map(it=>`<div class="tz-item" data-tz="${it.raw||it.tz}">
      <span class="ck">${chartTZ===it.tz?'✓':''}</span><span class="off">(${tzOffsetLabel(it.tz)})</span><span>${it.name}</span></div>`).join('');
  tzMenu.querySelectorAll('.tz-item').forEach(el=>el.onclick=()=>{ applyTimezone(el.dataset.tz); tzMenu.classList.remove('open'); });
}
tzClock.onclick=(e)=>{ e.stopPropagation(); const open=!tzMenu.classList.contains('open'); if(open) buildTzMenu(); tzMenu.classList.toggle('open',open); };
tzMenu.addEventListener('click',e=>e.stopPropagation());
document.addEventListener('click',()=>tzMenu.classList.remove('open'));
updateTzClock(); setInterval(updateTzClock,1000);
</script>
