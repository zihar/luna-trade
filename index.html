<style>

    --bg:#0e1116; --panel:#161b22; --border:#2a313c; --txt:#d7dbe0; --muted:#8b95a3;
    --green:#26a69a; --red:#ef5350; --accent:#3b82f6; --gold:#e3b341;
    --inset:#0b0e13; --btn:#21262d; --btn-hover:#272d36; --btn-border-hover:#3a4350; --line:#1c2229;
  }
  body.light{
    --bg:#f4f6f9; --panel:#ffffff; --border:#d6dbe2; --txt:#1e242e; --muted:#697280;
    --accent:#2563eb; --gold:#b07d0a;
    --inset:#eef1f5; --btn:#eef1f5; --btn-hover:#e1e6ed; --btn-border-hover:#c2cad4; --line:#e7eaef;
  }
  *{box-sizing:border-box}
  body{margin:0;font:13px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
       background:var(--bg);color:var(--txt);height:100vh;display:flex;flex-direction:column;overflow:hidden}
  .toolbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;padding:8px 12px;
           background:var(--panel);border-bottom:1px solid var(--border)}
  input,select{background:var(--inset);border:1px solid var(--border);color:var(--txt);border-radius:6px;padding:5px 8px;font-size:13px}
  button{background:var(--btn);border:1px solid var(--border);color:var(--txt);border-radius:6px;
         padding:6px 11px;cursor:pointer;font-size:13px}
  button:hover{border-color:var(--btn-border-hover);background:var(--btn-hover)}
  button:disabled{opacity:.4;cursor:not-allowed}
  button.primary{background:var(--accent);border-color:var(--accent);color:#fff}
  button.buy{background:var(--green);border-color:var(--green);color:#04211e}
  button.sell{background:var(--red);border-color:var(--red);color:#2a0808}
  button.tf{padding:5px 10px;font-weight:600}
  button.tf.on,button.on{background:var(--gold);border-color:var(--gold);color:#1a1400}
  button.tool.armed{background:var(--gold);border-color:var(--gold);color:#1a1400}
  .grow{flex:1}
  .status{font-size:12px;color:var(--muted)}
  .main{flex:1;display:flex;min-height:0}
  .chartwrap{flex:1;display:flex;flex-direction:column;min-width:0;background:var(--bg)}
  .tfbar{display:flex;gap:5px;align-items:center;padding:6px 10px;border-bottom:1px solid var(--border);background:var(--panel)}
  .tfbar .sep{width:1px;height:20px;background:var(--border);margin:0 4px}
  .zoomhint{font-size:11px;color:var(--muted);margin-left:auto}
  #chart{flex:1;min-height:0}
  .sidebar{width:300px;background:var(--panel);border-left:1px solid var(--border);
           display:flex;flex-direction:column;overflow-y:auto}
  .panel{padding:12px;border-bottom:1px solid var(--border)}
  .panel h3{margin:0 0 9px;font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted)}
  .row{display:flex;gap:6px;align-items:center;margin-bottom:7px}

  .row input,.row select{flex:1;width:100%}

  .stat{background:var(--inset);border:1px solid var(--border);border-radius:6px;padding:7px 9px}

<script>
// ===================== konstanta =====================
const TF_LIST = ['M1','M5','M15','M30','H1','H4','D','W'];
const DUR = {M1:6e4,M5:3e5,M15:9e5,M30:18e5,H1:36e5,H4:1.44e7,D:8.64e7,W:6.048e8}; // ms
const FWD_CHUNK = 500;
const NY_TZ = 'America/New_York';
const $ = s => document.querySelector(s);

// ===================== state =====================
let inst = 'EUR_USD';
const tfData = {};       // { 'M15':[{timestamp,open,high,low,close,volume}], ... } native asc
let currentTF = 'M15';
let T = null;            // cursor time (ms) = close-time candle TF tampil saat ini
let lastLen = -1;
let playing = false, playTimer = null;
let trade = null;        // {dir,entry,sl,tp,risk,time,lineEntry,lineSL,lineTP}
let journal = [];
let drawIds = [];        // overlay drawing
const extending = {};

// ===================== util =====================
function priceDecimals(){ return inst.includes('BTC')?1 : inst.includes('JPY')?3 : inst.includes('XAU')?3 : 5; }
function fmt(p){ return p==null||isNaN(p)?'—':(+p).toFixed(priceDecimals()); }
function nyTime(ms){
  try{
    return new Intl.DateTimeFormat('en-CA',{timeZone:NY_TZ,year:'numeric',month:'2-digit',day:'2-digit',
      hour:'2-digit',minute:'2-digit',hour12:false}).format(new Date(ms)).replace(',','');
  }catch(e){ return new Date(ms).toISOString().slice(0,16).replace('T',' '); }
}
// candle terungkap = yang sudah CLOSED pada cursor T (anti-lookahead), via binary search
function revealed(tf){
  const arr=tfData[tf]; if(!arr) return [];
  const d=DUR[tf]; let lo=0,h=arr.length;
  while(lo<h){ const m=(lo+h)>>1; if(arr[m].timestamp+d<=T) lo=m+1; else h=m; }
  return arr.slice(0,lo);
}
function currentCandle(){ const a=revealed(currentTF); return a.length?a[a.length-1]:null; }

// ===================== resize 8-titik (box) untuk rect & fib =====================
// 8 titik: 0 TL · 1 TC · 2 TR · 3 MR · 4 BR · 5 BC · 6 BL · 7 ML
function writeBox(pts,L,R,T,B){
  const mT=(L+R)/2, mV=(T+B)/2;
  const xy=[[L,T],[mT,T],[R,T],[R,mV],[R,B],[mT,B],[L,B],[L,mV]];
  for(let i=0;i<8;i++) pts[i]={timestamp:xy[i][0], value:xy[i][1]};
}
// dipanggil saat salah satu handle di-drag → recompute jadi kotak rapi (tetap axis-aligned)
function boxPressedMove(t){
  const pts=t.points, k=t.performPointIndex, pp=t.performPoint;
  if(!pts||pts.length<8||pp==null) return;
  let L=pts[0].timestamp, R=pts[2].timestamp, T=pts[0].value, B=pts[6].value;
  if(k===0||k===6||k===7) L=pp.timestamp;     // sisi kiri
  if(k===2||k===3||k===4) R=pp.timestamp;     // sisi kanan
  if(k===0||k===1||k===2) T=pp.value;         // sisi atas
  if(k===4||k===5||k===6) B=pp.value;         // sisi bawah
  writeBox(pts,L,R,T,B);
}
// setelah 2 klik (2 titik) → mekarkan jadi 8 titik handle
function expandBox(o){
  if(!o || (o.name!=='rect' && o.name!=='fib3')) return;
  if(!o.points || o.points.length>=8) return;
  const p0=o.points[0], p1=o.points[1];
  if(!p0||!p1||p0.value==null||p1.value==null) return;
  const L=Math.min(p0.timestamp,p1.timestamp), R=Math.max(p0.timestamp,p1.timestamp);
  const T=Math.max(p0.value,p1.value), B=Math.min(p0.value,p1.value);
  const ext = o.name==='fib3' ? {zeroTop:p0.value>=p1.value} : o.extendData;  // fib: arah 0→1 ikut tarikan
  const pts=new Array(8); writeBox(pts,L,R,T,B);
  try{ chart.overrideOverlay({id:o.id, points:pts, extendData:ext}); }catch(e){}
}

// ===================== custom overlay: rectangle/zona =====================
klinecharts.registerOverlay({
  name:'rect', totalStep:3, needDefaultPointFigure:true,
  performEventPressedMove:boxPressedMove,
  createPointFigures:({coordinates})=>{
    if(coordinates.length<2) return [];
    const xs=coordinates.map(c=>c.x), ys=coordinates.map(c=>c.y);
    const x=Math.min(...xs), y=Math.min(...ys), w=Math.max(...xs)-x, h=Math.max(...ys)-y;
    return [{ type:'rect', attrs:{x,y,width:w,height:h},
      styles:{ style:'stroke_fill', color:'rgba(227,179,65,0.10)', borderColor:'#e3b341', borderSize:1 } }];
  }
});

// custom overlay: Fibonacci 0 · 0.5 · 1 (lebar = selebar tarikan, arah ikut tarik)
klinecharts.registerOverlay({
  name:'fib3', totalStep:3, needDefaultPointFigure:true,
  performEventPressedMove:boxPressedMove,
  createPointFigures:({overlay,coordinates})=>{
    if(coordinates.length<2) return [];
    const xs=coordinates.map(c=>c.x), ys=coordinates.map(c=>c.y);
    const xL=Math.min(...xs), xR=Math.max(...xs), yTop=Math.min(...ys), yBot=Math.max(...ys);
    const vals=overlay.points.map(p=>p.value).filter(v=>v!=null);
    if(vals.length<2) return [];
    const vTop=Math.max(...vals), vBot=Math.min(...vals);
    const zeroTop = !(overlay.extendData && overlay.extendData.zeroTop===false);
    const figs=[];
    [0,0.5,1].forEach(Lv=>{
      const f = zeroTop ? Lv : (1-Lv);                 // 0 di atas / di bawah sesuai arah tarik
      const y = yTop + (yBot-yTop)*f;
      const price = vTop + (vBot-vTop)*f;
      figs.push({type:'line',attrs:{coordinates:[{x:xL,y},{x:xR,y}]},styles:{color:'#e3b341',size:1,style:'solid'}});
      figs.push({type:'text',attrs:{x:xL+2,y:y-2,text:Lv+'  '+price.toFixed(priceDecimals()),align:'left',baseline:'bottom'},styles:{color:'#e3b341',size:10}});
    });
    return figs;
  }
});

// custom overlay: Long / Short position (ala TV) — 3 titik independen: Entry, TP, SL.
// TP & SL bisa di-drag sendiri-sendiri; RR dihitung live dari jaraknya.
function posFigures(dir){
  return ({overlay,coordinates,bounding})=>{
    const pts=overlay.points;
    if(!coordinates.length||pts[0].value==null) return [];
    const dec=priceDecimals();
    const pip=parseFloat(document.getElementById('pipSize').value)||0.0001;
    const xs=coordinates.map(c=>c.x);
    let xL=Math.min(...xs), xR=Math.max(...xs);
    if(xR<=xL) xR=(bounding&&bounding.width)?bounding.width:xL+140;
    const F=[];
    const line=(y,c)=>F.push({type:'line',attrs:{coordinates:[{x:xL,y},{x:xR,y}]},styles:{color:c,size:1}});
    const box =(y1,y2,c)=>F.push({type:'rect',attrs:{x:xL,y:Math.min(y1,y2),width:xR-xL,height:Math.abs(y2-y1)},styles:{style:'fill',color:c}});
    const txt =(y,t,c,bl)=>F.push({type:'text',attrs:{x:xL+4,y,text:t,align:'left',baseline:bl||'bottom'},styles:{color:c,size:10}});

    const entry=pts[0].value, yE=coordinates[0].y;
    const haveTP = pts.length>1 && pts[1] && pts[1].value!=null && coordinates.length>1;
    const haveSL = pts.length>2 && pts[2] && pts[2].value!=null && coordinates.length>2;
    if(!haveTP){ line(yE,'#e3b341'); txt(yE,'Entry '+entry.toFixed(dec),'#e3b341'); return F; }

    const tp=pts[1].value, yT=coordinates[1].y;
    box(yE,yT,'rgba(38,166,154,0.14)'); line(yT,'#26a69a'); line(yE,'#e3b341');
    txt(yT,'TP '+tp.toFixed(dec)+'  ('+Math.round(Math.abs(tp-entry)/pip)+'p)','#26a69a');
    if(!haveSL){
      txt(yE,'Entry '+entry.toFixed(dec)+'  ['+dir.toUpperCase()+']  — klik SL','#e3b341');
      return F;
    }
    const sl=pts[2].value, yS=coordinates[2].y;
    const riskDist=Math.abs(entry-sl), rewDist=Math.abs(tp-entry);
    const rr=riskDist?(rewDist/riskDist):0;
    box(yE,yS,'rgba(239,83,80,0.14)'); line(yS,'#ef5350');
    txt(yE,'Entry '+entry.toFixed(dec)+'  ['+dir.toUpperCase()+']  RR 1:'+rr.toFixed(2),'#e3b341');
    txt(yS,'SL '+sl.toFixed(dec)+'  ('+Math.round(riskDist/pip)+'p)','#ef5350','top');
    return F;
  };
}

// custom overlay: Date Range — 2 klik, kotak vertikal + label jumlah bar & durasi (ala TV)
function fmtDur(ms){
  const m=Math.round(ms/6e4);
  if(m<60) return m+'m';
  const h=Math.floor(m/60), mm=m%60;
  if(h<24) return mm? h+'j '+mm+'m' : h+'j';
  const d=Math.floor(h/24), hh=h%24;
  return hh? d+'h '+hh+'j' : d+'h';
}
// jumlah bar antara 2 timestamp = selisih indeks candle di data (akurat thd gap weekend)
function barsBetween(t0,t1){
  const arr=tfData[currentTF];
  if(!arr||!arr.length) return Math.round(Math.abs(t1-t0)/DUR[currentTF]);
  const bs=(t)=>{let a=0,b=arr.length;while(a<b){const m=(a+b)>>1; if(arr[m].timestamp<t) a=m+1; else b=m;} return a;};
  return Math.abs(bs(Math.max(t0,t1))-bs(Math.min(t0,t1)));
}
klinecharts.registerOverlay({
  name:'dateRange', totalStep:3, needDefaultPointFigure:true,
  createPointFigures:({overlay,coordinates})=>{
    if(coordinates.length<2) return [];
    const a=coordinates[0], b=coordinates[1];
    // garis utama + panah di ujung b
    const dx=b.x-a.x, dy=b.y-a.y, L=Math.hypot(dx,dy)||1, ux=dx/L, uy=dy/L;
    const s=10, c=Math.cos(.42), sn=Math.sin(.42);
    const w1x=b.x-s*(ux*c-uy*sn), w1y=b.y-s*(ux*sn+uy*c);
    const w2x=b.x-s*(ux*c+uy*sn), w2y=b.y-s*(-ux*sn+uy*c);
    const figs=[
      {type:'line',attrs:{coordinates:[a,b]},styles:{color:'#3b82f6',size:2}},
      {type:'line',attrs:{coordinates:[b,{x:w1x,y:w1y}]},styles:{color:'#3b82f6',size:2}},
      {type:'line',attrs:{coordinates:[b,{x:w2x,y:w2y}]},styles:{color:'#3b82f6',size:2}},
    ];
    const t0=overlay.points[0]&&overlay.points[0].timestamp, t1=overlay.points[1]&&overlay.points[1].timestamp;
    if(t0!=null&&t1!=null){
      const bars=barsBetween(t0,t1);
      const label=bars+' bar · '+fmtDur(bars*DUR[currentTF]);
      const cx=(a.x+b.x)/2, cy=Math.max(a.y,b.y)+16, w=label.length*6.4+14;
      figs.push({type:'rect',attrs:{x:cx-w/2,y:cy-9,width:w,height:18},styles:{style:'fill',color:'#3b82f6'}});
      figs.push({type:'text',attrs:{x:cx,y:cy,text:label,align:'center',baseline:'middle'},styles:{color:'#fff',size:11}});
    }
    return figs;
  }
});

// Zoom HARGA via scroll wheel saat kursor di zona sumbu harga (kanan).
// KLineCharts tak punya API zoom-harga; kita terjemahkan wheel -> drag vertikal di sumbu
// (gesture skala harga bawaan KLineCharts).
const AXIS_ZONE = 70; // lebar perkiraan sumbu harga (px) dari tepi kanan chart
(function priceWheelZoom(){
  const el=$('#chart');
  el.addEventListener('wheel',(e)=>{
    const rect=el.getBoundingClientRect();
    const xInAxis = (e.clientX-rect.left) > (rect.width-AXIS_ZONE);
    if(!xInAxis) return;                 // di body chart → biarkan zoom waktu default
    e.preventDefault(); e.stopPropagation();
    const tgt=document.elementFromPoint(e.clientX,e.clientY); if(!tgt) return;
    const cx=e.clientX, cy=e.clientY;
    const delta=e.deltaY>0?14:-14;       // scroll bawah = squeeze, atas = stretch
    const mk=(type,y,btn)=> new MouseEvent(type,{bubbles:true,cancelable:true,view:window,clientX:cx,clientY:y,buttons:btn,button:0});
    tgt.dispatchEvent(mk('mousedown',cy,1));
    tgt.dispatchEvent(mk('mousemove',cy+delta,1));
    tgt.dispatchEvent(mk('mouseup',cy+delta,0));
  },{passive:false,capture:true});
})();

async function loadInit(){
  inst = $('#instrument').value;
  const date = $('#date').value;
  if(!date){ setStatus('Pilih tanggal dulu.',true); return; }
  localStorage.setItem('br_inst',inst); localStorage.setItem('br_date',date);
  for(const k in tfData) delete tfData[k];
  clearDrawings(); resetTrade();
  chart.setPriceVolumePrecision(priceDecimals(),0);
  setStatus('Mengambil '+inst+' '+currentTF+' …');
  try{
    const todayStr=new Date().toISOString().slice(0,10);
    const opt = (date>=todayStr) ? {count:5000} : {count:5000,to:date+'T00:00:00Z'};
    const c = await fetchCandles(currentTF,opt);
    if(!c.length) throw new Error('data kosong');
    tfData[currentTF]=c;
  }catch(e){ setStatus('Gagal load: '+e.message,true); return; }
  const a=tfData[currentTF];
  T = a[a.length-1].timestamp + DUR[currentTF];
  lastLen=-1;
  setStatus(`Loaded ${currentTF}. Next/Play untuk maju (auto-extend forward). Ganti TF di atas chart.`);
  render(true);
}

async function fetchCandles(tf,{count,to,from}){
  let u=`/api/candles?instrument=${encodeURIComponent(inst)}&granularity=${tf}&count=${count||5000}`;
  if(to)   u+=`&to=${encodeURIComponent(to)}`;
  if(from) u+=`&from=${encodeURIComponent(from)}`;
  const r=await fetch(u); const j=await r.json();
  if(j.errorMessage) throw new Error(j.errorMessage);
  if(!j.candles) throw new Error('respons tak terduga');
  return j.candles.filter(c=>c.complete).map(c=>({
    timestamp:Date.parse(c.time), open:+c.mid.o, high:+c.mid.h, low:+c.mid.l, close:+c.mid.c, volume:+(c.volume||0),
  })).sort((a,b)=>a.timestamp-b.timestamp);
}

async function switchTF(tf){

  if(!tfData[tf]){
    setStatus('Mengambil '+tf+' …');

    catch(e){ setStatus('Gagal TF '+tf+': '+e.message,true); return; }
  }
  currentTF=tf; localStorage.setItem('br_tf',tf); highlightTF();
  lastLen=-1; render(true);
  setStatus('TF → '+tf);
}

// ===================== render =====================
function render(full){
  if(T==null) return;
  const data=revealed(currentTF);
  if(full || lastLen<0 || data.length<lastLen){ chart.applyNewData(data); }
  else if(data.length>lastLen){ for(let k=lastLen;k<data.length;k++) chart.updateData(data[k]); }
  lastLen=data.length;
  drawTradeLines();
  const cur=currentCandle();
  $('#clock').textContent = T?nyTime(T-1):'—';
  $('#curprice').textContent = cur?fmt(cur.close):'—';
  $('#tfinfo').textContent = `${currentTF} · ${data.length} bar`;
  updateOpenTradeBox();
}

// ===================== replay control =====================
function step(d){
  if(T==null) return;
  const arr=tfData[currentTF], dur=DUR[currentTF];
  let lo=0,h=arr.length;
  while(lo<h){ const m=(lo+h)>>1; if(arr[m].timestamp+dur<=T) lo=m+1; else h=m; }
  const idx=lo-1;
  if(d>0){
    if(idx+1>=arr.length){ autoExtend(currentTF); pauseIfNoData(); return; }
    const ni=idx+1; T=arr[ni].timestamp+dur;
    checkTrade(arr[ni]);
    if(arr.length-ni<30) autoExtend(currentTF);
  }else{
    if(idx<=0) return;
    T=arr[idx-1].timestamp+dur;
  }
  render();
}
function pauseIfNoData(){ if(playing){ pause(); setStatus('Menarik data forward… tekan Play lagi.'); } }

// ===================== auto-extend forward =====================
async function autoExtend(tf){
  if(extending[tf]) return;
  const arr=tfData[tf]; if(!arr||!arr.length) return;
  extending[tf]=true;
  try{
    const from=new Date(arr[arr.length-1].timestamp+1000).toISOString();
    const more=await fetchCandles(tf,{count:FWD_CHUNK,from});
    const last=arr[arr.length-1].timestamp;
    const fresh=more.filter(c=>c.timestamp>last);
    if(fresh.length){ arr.push(...fresh); render(); }
    else setStatus('Sudah di ujung data terbaru OANDA utk '+tf+'.');
  }catch(e){ setStatus('Auto-extend gagal: '+e.message,true); }
  finally{ extending[tf]=false; }
}

// ===================== trade (drag garis) =====================
function openTrade(dir){
  if(T==null||trade) return;
  const cur=currentCandle(); if(!cur) return;
  const entry=cur.close, pip=+$('#pipSize').value, slp=+$('#slPips').value, rr=+$('#rr').value;
  const dist=slp*pip;
  const sl=dir==='long'?entry-dist:entry+dist;
  const tp=dir==='long'?entry+dist*rr:entry-dist*rr;
  trade={dir,entry,sl,tp,risk:dist,time:cur.timestamp,lineEntry:null,lineSL:null,lineTP:null};
  $('#closeBtn').disabled=false;
  drawTradeLines(); updateOpenTradeBox();
}
function hline(value,color,onMove){
  return chart.createOverlay({
    name:'horizontalStraightLine', points:[{value}],
    styles:{ line:{ color, style:'dashed', size:1 } },
    onPressedMoving:(e)=>{ const v=e.overlay.points[0].value; if(v!=null) onMove(+v); return false; },
  });
}
function drawTradeLines(){
  ['lineEntry','lineSL','lineTP'].forEach(k=>{ if(trade&&trade[k]){ try{chart.removeOverlay(trade[k]);}catch(e){} trade[k]=null; }});
  if(!trade) return;
  trade.lineEntry=hline(trade.entry,'#e3b341',v=>{ trade.entry=v; recalcRisk(); updateOpenTradeBox(); });
  trade.lineSL   =hline(trade.sl,'#ef5350',   v=>{ trade.sl=v;    recalcRisk(); updateOpenTradeBox(); });
  trade.lineTP   =hline(trade.tp,'#26a69a',   v=>{ trade.tp=v;    updateOpenTradeBox(); });
}
function recalcRisk(){ if(trade) trade.risk=Math.abs(trade.entry-trade.sl)||trade.risk; }
function checkTrade(c){
  if(!trade) return;
  let exit=null;
  if(trade.dir==='long'){ if(c.low<=trade.sl) exit=trade.sl; else if(c.high>=trade.tp) exit=trade.tp; }
  else{ if(c.high>=trade.sl) exit=trade.sl; else if(c.low<=trade.tp) exit=trade.tp; }
  if(exit!==null) closeTrade(exit,c.timestamp);
}
function closeTrade(exit,time){
  if(!trade) return;
  const mul=trade.dir==='long'?1:-1;
  const r=(exit-trade.entry)*mul/(trade.risk||1e-9);
  journal.push({time:trade.time,exitTime:time,dir:trade.dir,entry:trade.entry,exit,r});
  ['lineEntry','lineSL','lineTP'].forEach(k=>{ if(trade[k]){ try{chart.removeOverlay(trade[k]);}catch(e){} }});
  trade=null; $('#closeBtn').disabled=true;
  saveJournal(); renderStats(); renderJournal(); updateOpenTradeBox();
}
$('#buyBtn').onclick=()=>openTrade('long');
$('#sellBtn').onclick=()=>openTrade('short');
$('#closeBtn').onclick=()=>{ const c=currentCandle(); if(trade&&c) closeTrade(c.close,c.timestamp); };
function updateOpenTradeBox(){
  const box=$('#openTradeBox');
  if(!trade){ box.innerHTML=''; return; }
  const cur=currentCandle(); const mul=trade.dir==='long'?1:-1;
  const liveR=cur?(cur.close-trade.entry)*mul/(trade.risk||1e-9):0;
  box.innerHTML=`<div class="open-trade">
    <b style="color:${trade.dir==='long'?'#26a69a':'#ef5350'}">${trade.dir.toUpperCase()}</b>
    @ ${fmt(trade.entry)} · SL ${fmt(trade.sl)} · TP ${fmt(trade.tp)}<br>
    Floating: <b class="${liveR>=0?'pos':'neg'}">${liveR>=0?'+':''}${liveR.toFixed(2)}R</b></div>`;
}

// ===================== drawing tools (ikon, ala TV) =====================
let selectedId=null, hoverId=null, inProgressId=null;
function disarmIcons(){ document.querySelectorAll('.dtool').forEach(x=>x.classList.remove('armed')); }
function delHooks(){ return {
  onDrawEnd:(e)=>{ try{expandPosition(e&&e.overlay); expandBox(e&&e.overlay); applyTextInput(e&&e.overlay);}catch(_){} inProgressId=null; disarmIcons(); return false; },
  onClick:(e)=>{ selectedId=e.overlay.id; return false; },
  onDoubleClick:(e)=>{ try{ if(e.overlay&&e.overlay.name==='text') editTextOverlay(e.overlay); }catch(_){} return false; },
  onSelected:(e)=>{ selectedId=e.overlay.id; return false; },
  onDeselected:(e)=>{ if(selectedId===e.overlay.id) selectedId=null; return false; },
  onMouseEnter:(e)=>{ hoverId=e.overlay.id; return false; },
  onMouseLeave:(e)=>{ if(hoverId===e.overlay.id) hoverId=null; return false; },
  onRemoved:(e)=>{ drawIds=drawIds.filter(x=>x!==e.overlay.id); if(selectedId===e.overlay.id) selectedId=null; if(hoverId===e.overlay.id) hoverId=null; return false; },
};}
function createDraw(name,btn,extra){
  try{
    const id=chart.createOverlay(Object.assign({name},delHooks(),extra||{}));
    if(id){ drawIds.push(id); inProgressId=id; disarmIcons(); if(btn) btn.classList.add('armed'); }
    else setStatus('Gagal aktifkan '+name,true);
  }catch(e){ setStatus('Drawing error: '+e.message,true); }
}
function clearDrawings(){ drawIds.slice().forEach(id=>{ try{chart.removeOverlay(id);}catch(e){} }); drawIds=[]; selectedId=hoverId=null; }

// Text: editor inline di chart. Dipakai saat baru dibuat & saat double-click teks lama.
let textEditorEl=null;
function applyTextInput(o){ editTextOverlay(o); }   // dipanggil dari onDrawEnd
function editTextOverlay(o){
  if(!o || o.name!=='text') return;
  const p=o.points && o.points[0]; if(!p) return;
  let px=null;
  try{ px=chart.convertToPixel({timestamp:p.timestamp,value:p.value},{paneId:'candle_pane',absolute:true}); }catch(e){}
  if(Array.isArray(px)) px=px[0];
  const rect=$('#chart').getBoundingClientRect();
  const x=rect.left+(px?px.x:rect.width/2), y=rect.top+(px?px.y:rect.height/2);

  if(textEditorEl){ try{textEditorEl.remove();}catch(e){} textEditorEl=null; }
  const ta=document.createElement('textarea');
  ta.className='text-editor'; ta.value=o.extendData||''; ta.rows=1;
  ta.style.left=Math.round(x)+'px'; ta.style.top=Math.round(y-14)+'px';
  document.body.appendChild(ta); textEditorEl=ta;
  ta.focus(); ta.select();

  let done=false;
  const close=(save)=>{
    if(done) return; done=true;
    try{ta.remove();}catch(e){} if(textEditorEl===ta) textEditorEl=null;
    const fresh=(o.extendData==null||o.extendData==='');
    if(save){
      const v=ta.value;
      if(v.trim()==='') { try{chart.removeOverlay(o.id);}catch(e){} }
      else { try{chart.overrideOverlay({id:o.id,extendData:v});}catch(e){} }
    }else if(fresh){ try{chart.removeOverlay(o.id);}catch(e){} }  // batal saat baru → hapus
  };
  const grow=()=>{ ta.style.height='auto'; ta.style.height=ta.scrollHeight+'px'; };
  ta.addEventListener('input',grow); grow();
  ta.addEventListener('keydown',ev=>{
    ev.stopPropagation();                              // Enter = baris baru (perilaku textarea default)
    if(ev.key==='Escape'){ ev.preventDefault(); close(false); }
  });
  ta.addEventListener('blur',()=>close(true));         // simpan saat klik ke tempat lain
}

const DEFAULT_POS_RR = 3;  // klik tool → klik 1x di chart → posisi 1:3, lalu bisa di-adjust
// risk default = rata-rata range candle (ATR sederhana) TF aktif → ukuran selalu proporsional TF
function tfDefaultRisk(){
  const arr=revealed(currentTF), n=arr.length;
  if(n>=2){
    const k=Math.min(14,n); let sum=0;
    for(let i=n-k;i<n;i++) sum += (arr[i].high-arr[i].low);
    const avg=sum/k; if(avg>0) return avg;
  }
  return (parseFloat($('#slPips').value)||20)*(parseFloat($('#pipSize').value)||0.0001); // fallback
}
// 5 titik: 0 Entry · 1 TP · 2 SL · 3 handle-lebar-kiri · 4 handle-lebar-kanan.
function expandPosition(o){
  if(!o || (o.name!=='longPosition' && o.name!=='shortPosition')) return;
  if(!o.points || o.points.length>=5) return;          // sudah di-expand
  const p0=o.points[0]; if(!p0 || p0.value==null) return;
  const dir=o.name==='longPosition'?'long':'short';
  const entry=p0.value, tEntry=p0.timestamp;
  const risk=tfDefaultRisk();
  const sl=dir==='long'? entry-risk : entry+risk;
  const tp=dir==='long'? entry+DEFAULT_POS_RR*risk : entry-DEFAULT_POS_RR*risk;
  const tRight=tEntry + 15*DUR[currentTF];
  try{ chart.overrideOverlay({ id:o.id, points:[
    {timestamp:tEntry,value:entry}, {timestamp:tRight,value:tp}, {timestamp:tRight,value:sl},
    {timestamp:tEntry,value:tp},    {timestamp:tRight,value:entry} ] }); }
  catch(e){ setStatus('Position expand error: '+e.message,true); }
}
// Entry/TP/SL = drag vertikal (level); handle kiri/kanan = drag horizontal (lebar waktu).
function posPressedMove(t){
  const pts=t.points, k=t.performPointIndex, pp=t.performPoint;
  if(!pts||pts.length<5||pp==null) return;
  let entry=pts[0].value, tp=pts[1].value, sl=pts[2].value;
  let tL=pts[0].timestamp, tR=pts[1].timestamp;
  if(k===0) entry=pp.value;            // Entry: hanya level
  else if(k===1) tp=pp.value;          // TP: hanya level
  else if(k===2) sl=pp.value;          // SL: hanya level
  else if(k===3) tL=pp.timestamp;      // handle kiri: hanya lebar
  else if(k===4) tR=pp.timestamp;      // handle kanan: hanya lebar
  pts[0]={timestamp:tL, value:entry};
  pts[1]={timestamp:tR, value:tp};
  pts[2]={timestamp:tR, value:sl};
  pts[3]={timestamp:tL, value:tp};     // di sisi kiri, sejajar garis TP (tak menimpa Entry)
  pts[4]={timestamp:tR, value:entry};  // di sisi kanan, sejajar garis Entry
}

// ===================== stats & journal =====================
function renderStats(){
  const n=journal.length, wins=journal.filter(t=>t.r>0).length;
  const totR=journal.reduce((s,t)=>s+t.r,0);
  const gW=journal.filter(t=>t.r>0).reduce((s,t)=>s+t.r,0);
  const gL=Math.abs(journal.filter(t=>t.r<0).reduce((s,t)=>s+t.r,0));
  $('#stTrades').textContent=n;
  $('#stWin').textContent=n?Math.round(wins/n*100)+'%':'—';
  const rEl=$('#stR'); rEl.textContent=(totR>=0?'+':'')+totR.toFixed(1); rEl.className='v '+(totR>=0?'pos':'neg');
  $('#stPF').textContent=gL?(gW/gL).toFixed(2):(gW?'∞':'—');
}
function renderJournal(){
  $('#journal').innerHTML=journal.slice().reverse().map(t=>`<tr>
    <td>${nyTime(t.time).slice(5)}</td>
    <td style="color:${t.dir==='long'?'#26a69a':'#ef5350'}">${t.dir==='long'?'▲':'▼'}</td>
    <td>${fmt(t.entry)}</td><td>${fmt(t.exit)}</td>
    <td class="${t.r>0?'pos':'neg'}">${t.r>0?'+':''}${t.r.toFixed(2)}</td></tr>`).join('');
}
function saveJournal(){ localStorage.setItem('br_journal',JSON.stringify(journal)); }
function loadJournal(){ try{journal=JSON.parse(localStorage.getItem('br_journal'))||[]}catch(e){journal=[]} }
$('#resetBtn').onclick=()=>{ if(confirm('Hapus semua journal?')){ journal=[]; resetTrade(); saveJournal(); renderStats(); renderJournal(); } };
function resetTrade(){ if(trade){['lineEntry','lineSL','lineTP'].forEach(k=>{if(trade[k]){try{chart.removeOverlay(trade[k]);}catch(e){}}});} trade=null; $('#closeBtn').disabled=true; }

// ===================== keyboard =====================
window.addEventListener('keydown',e=>{
  if(['INPUT','SELECT','TEXTAREA'].includes(e.target.tagName)) return;
  if(e.key==='ArrowRight'){e.preventDefault();step(1)}
  else if(e.key==='ArrowLeft'){e.preventDefault();step(-1)}
  else if(e.key===' '){e.preventDefault();togglePlay()}
  else if(e.key==='Delete'||e.key==='Backspace'){ const id=selectedId||hoverId; if(id){ e.preventDefault(); try{chart.removeOverlay(id);}catch(_){} } }
  else if(e.key==='Escape'){ if(inProgressId){ try{chart.removeOverlay(inProgressId);}catch(_){} inProgressId=null; disarmIcons(); } }
  else if(e.key.toLowerCase()==='b'){openTrade('long')}
  else if(e.key.toLowerCase()==='s'){openTrade('short')}
});

// ===================== Bar Replay: pilih titik mulai langsung di chart (ala TV) =====================
let pickMode=false, hoverTs=null;
const replayBtn=$('#replayPick');
chart.subscribeAction('onCrosshairChange', d=>{ if(d&&d.kLineData&&d.kLineData.timestamp!=null) hoverTs=d.kLineData.timestamp; });
replayBtn.onclick=()=>{
  if(T==null){ setStatus('Load dulu.',true); return; }
  pickMode=!pickMode; replayBtn.classList.toggle('on',pickMode);
  if(pickMode){
    chart.applyNewData(tfData[currentTF]); lastLen=tfData[currentTF].length;  // tampilkan semua bar
    setStatus('Bar Replay: arahkan & KLIK bar di chart untuk pilih titik mulai replay.');
  }else{ render(true); setStatus('Pilih titik dibatalkan.'); }
};
$('#chart').addEventListener('click',()=>{
  if(!pickMode||hoverTs==null) return;
  T = hoverTs + DUR[currentTF];
  pickMode=false; replayBtn.classList.remove('on'); lastLen=-1; render(true);
  setStatus('Replay mulai '+nyTime(hoverTs)+' (NY). Next/Play untuk maju.');
});

ctxMenu.className='ctxmenu'; ctxMenu.style.display='none';
ctxMenu.innerHTML='<div class="ctxitem" id="ctxReset">↺ Reset chart view</div>';
document.body.appendChild(ctxMenu);
function hideCtx(){ ctxMenu.style.display='none'; }
$('#chart').addEventListener('contextmenu',e=>{
  e.preventDefault();
  // jepit posisi agar tak keluar viewport
  const mw=170,mh=44;
  ctxMenu.style.left=Math.min(e.clientX,window.innerWidth-mw)+'px';
  ctxMenu.style.top =Math.min(e.clientY,window.innerHeight-mh)+'px';
  ctxMenu.style.display='block';
});
window.addEventListener('click',hideCtx);
window.addEventListener('blur',hideCtx);
$('#ctxReset').onclick=()=>{ hideCtx(); resetChartView(); };
// Kembalikan zoom/scroll/skala ke default utk instrument + TF yang sedang dibuka.
function resetChartView(){
  if(T==null){ setStatus('Load dulu.',true); return; }
  lastLen=-1; render(true);                 // re-apply data current → reset skala harga & posisi
  try{ chart.setBarSpace(8); }catch(e){}     // reset level zoom waktu ke default
  try{ chart.scrollToRealTime(); }catch(e){} // tempel ke bar terbaru yang terungkap
  setStatus('Chart view di-reset ke default ('+currentTF+').');
}
