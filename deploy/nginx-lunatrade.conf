# Reverse proxy nginx untuk Luna Trade.
#
# Taruh di server sebagai: /etc/nginx/sites-available/lunatrade
# lalu symlink:            ln -s /etc/nginx/sites-available/lunatrade /etc/nginx/sites-enabled/
#
# Catatan: blok TLS (listen 443 + ssl_certificate) di bawah ini ditambahkan
# OTOMATIS oleh `certbot --nginx`. Saat setup pertama kali kamu cukup menulis
# blok HTTP (port 80) di bawah; jalankan certbot, lalu certbot yang menyisipkan
# baris ber-tag "# managed by Certbot".

server {
    server_name lunatrade.domudame.com;

    location / {
        proxy_pass http://127.0.0.1:8765;     # app Go (systemd: bar-replay)
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # dukung websocket / koneksi panjang (live auto-refresh)
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_read_timeout 86400;
    }

    listen 443 ssl;                                                            # managed by Certbot
    ssl_certificate     /etc/letsencrypt/live/lunatrade.domudame.com/fullchain.pem;  # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/lunatrade.domudame.com/privkey.pem;    # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf;                           # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;                            # managed by Certbot
}

# Redirect semua HTTP -> HTTPS (juga ditulis otomatis oleh Certbot).
server {
    if ($host = lunatrade.domudame.com) {
        return 301 https://$host$request_uri;                                  # managed by Certbot
    }

    listen 80;
    server_name lunatrade.domudame.com;
    return 404;                                                                # managed by Certbot
}
